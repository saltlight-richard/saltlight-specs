 calls create a race window. The `last_polled` key must also be written in the same UPDATE.\n\n5. **`_create_connect_card_from_workflow()` — read `attribute_ids` from `mapped_forms`, not from the CareFlow config.** If the existing code does `attr_ids = cfg.get('attribute_ids', {})`, that is the old per-CareFlow architecture. Replace with the `form_map` lookup pattern shown in the \"Card writer\" section above. The function also needs `rock_meta` passed in as a parameter to perform this lookup.\n\n6. **`_create_connect_card_from_workflow()` — resolve CampusPicker values before storing.** If the existing code stores the raw `\"1\"` string in `campus_name` without resolving via `rock_meta['campuses']`, fix it. The raw CampusPicker value is a string Campus Id, not the campus name.\n\n7. **Any code that writes timestamp strings to `account_metadata` — append `'Z'` to all UTC timestamp strings.** Use `datetime.utcnow().isoformat() + 'Z'`. This applies to `_update_poll_cursor()` and any other code that writes `last_polled`, `poll_cursor_track1`, or `poll_cursor_track2`. Without the `Z` suffix, comparisons against timezone-aware Python datetimes raise `TypeError` and cursor advancement silently breaks.\n"}, {"label": "Feature 4 — Card Capture Push", "content": "# Feature 4 — Card Capture Push: SaltLight → Rock\n\n## What it does\n\nWhen a volunteer scans or enters a connect card in SaltLight, SaltLight pushes that guest into Rock immediately.\n\nHere's what happens in order:\n\n1. SaltLight searches Rock for an existing Person by email, then by phone. If found, it updates the existing record. If not found, it creates a new one marked as Visitor.\n2. SaltLight applies a Tag to that Person — the \"New Visitor\" tag, or whatever the admin configured in Step 6.\n3. SaltLight creates a new instance of the church's existing Workflow type (e.g. \"First Time Guest\" — not a SaltLight-created form, the one the church already has in Rock). The guest's card data goes in as AttributeValues on that Workflow.\n\nIf Rock is unreachable at any point, the card is marked pending and retried on the next poll cycle. The CareFlow in SaltLight runs immediately regardless — Rock sync failure never blocks the guest follow-up.\n\n## User story\n\nAs a church admin using Rock, I want guests captured in SaltLight to appear in Rock automatically — matched against existing Person records, tagged as a new visitor, and added to my existing First Time Guest Workflow with their card data already filled in — so my Rock database stays current without anyone re-typing cards.\n\n## User journey\n\n1. A volunteer scans a physical connect card (or types one in) in SaltLight.\n2. SaltLight writes the card and matches it to a CareFlow that has Rock write-back configured.\n3. SaltLight searches Rock for an existing Person record:\n   - Search 1: by email — `GET /api/People?$filter=Email eq '{card_email}'`\n   - Search 2: by phone (only if email is blank or returns nothing)\n4. Depending on the result:\n   - **Person found:** SaltLight updates the existing Rock record. Only non-blank card fields are written — nothing is blanked out.\n   - **Person not found:** SaltLight creates a new Rock Person. Rock returns a **bare integer** (e.g. `22`) — not a dict. SaltLight reads that integer directly as the new Person Id.\n5. SaltLight fetches the Person's `Guid` and `PrimaryAliasId` (needed for the Tag and Workflow steps).\n6. If the CareFlow has Tags configured, SaltLight applies each one to the Person (loops over `writeback_tag_ids` array — each tag is a separate `POST /api/TaggedItems` call).\n7. If the CareFlow has WorkflowTypes configured, SaltLight creates a new Workflow instance for each one (loops over `writeback_workflow_type_ids` array). Card fields are written into each Workflow as AttributeValues.\n8. The card's sync status flips to `synced`. The CareFlow runs in SaltLight as normal.\n\nIf Rock is unreachable at steps 3–7, the card is marked `pending`. The retry sweep in the Rock poll Lambda picks it up on the next poll cycle. The CareFlow is not affected either way.\n\n## Examples\n\n**Maria — existing Person, full sync.**\n\nVolunteer scans Maria's card. Rock already has a Person record for her (matched by email, Id=9). SaltLight issues `PATCH /api/People/9` with her non-blank card fields. It then fetches her Guid and PrimaryAliasId, applies the \"New Visitor\" Tag, and creates a new Workflow instance of the church's \"First Time Guest\" type (Id=24) with her card data as AttributeValues. `rock_sync_status` → `synced`.\n\n**David — new Person.**\n\nDavid has never been in Rock. Email search returns empty. Phone search returns empty. SaltLight posts to `/api/People`. Rock responds with `201` and a bare integer: `22`. David is now Rock Person Id=22 — status Active, connection status Visitor. SaltLight fetches his Guid and PrimaryAliasId, applies the Tag, creates the Workflow with his card data. `rock_sync_status` → `synced`.\n\n**Emily — Rock is down, retry succeeds.**\n\nRock's API is unreachable when Emily's card comes in. SaltLight writes `rock_sync_status = 'pending'`, `rock_sync_attempts = 1`. Emily's CareFlow proceeds immediately — welcome SMS goes out, leader thread fires. Two hours later, the retry sweep picks up her pending card, Rock is back up, and the sync completes. `rock_sync_status` → `synced`, `rock_sync_attempts = 2`.\n\n## Acceptance criteria\n\nAfter a successful card capture sync, verify against the live Rock API:\n\n- **Rock Person exists:** `GET /api/People?$filter=Email eq '{card_email}'` returns at least one record. New persons have `ConnectionStatusValueId` equal to `rock_meta['visitor_id']` and `RecordStatusValueId` equal to `rock_meta['active_status_id']`. (On the test env, these are `66` and `3` respectively — but never hardcode these values; always read from `account_metadata['rockrms']`.)\n- **Rock Tags applied:** For each `tag_id` in `writeback_tag_ids`, `GET /api/TaggedItems?$filter=TagId eq {tag_id} and EntityGuid eq '{person_guid}'` returns at least one `TaggedItem` row with `EntityTypeId=15` (Person). All configured tags must be applied.\n- **Rock Workflows created:** For each `wf_type_id` in `writeback_workflow_type_ids`, `GET /api/Workflows?$filter=WorkflowTypeId eq {wf_type_id} and InitiatorPersonAliasId eq {primary_alias_id} and CreatedDateTime gt datetime'{sync_started_at}'` returns the newly created workflow with `Status=\"Active\"`. One workflow instance per configured type. The `CreatedDateTime` filter prevents a false pass from pre-existing workflows for this person.\n- **Rock AttributeValues populated:** For each `(attribute_id, value)` pair derived from `account_metadata['rockrms']['mapped_forms']` (looked up by `workflow_type_id`), `GET /api/AttributeValues?$filter=EntityId eq {workflow_id} and AttributeId eq {attr_id}` returns a row with the expected string `Value`.\n- **DB state:** `rock_sync_status='synced'`, `rock_sync_attempts >= 1`, `rock_sync_last_attempted` is non-null.\n- **PATCH is additive:** When an existing Person is found, only non-blank card fields appear in the PATCH payload. Existing Rock values for fields the card left blank are preserved.\n- **Source guard:** Connect Cards with `source` in `{rock_track1, rock_track2, rock_webhook}` have `rock_sync_status = NULL` and are never pushed to Rock.\n- **No-identity guard:** Connect Cards with neither email nor phone have `rock_sync_status = NULL` — no ghost Person record appears in Rock.\n- **CareFlow independence:** If Rock sync fails, the CareFlow's downstream SaltLight steps still execute (welcome SMS sent, leader thread fired).\n- **Retry increments attempts:** Each poll cycle, pending cards are re-attempted and `rock_sync_attempts` increments by 1.\n- **Failure escalation:** After 10 total failed attempts, `rock_sync_status = 'failed'` and an alert fires to SaltLight's internal team channel.\n- **No demotion:** A `connect_card` row with `rock_sync_status = 'synced'` or `'failed'` is never flipped back to `'pending'`.\n\n---\n\n## Technical API contract\n\n### Rock API calls (in order)\n\nAll calls validated live against `saltlight.rockcloud.com` (Rock 18.1.0.0).\n\n**1. Email dedup**\n\n- `GET /api/People?$filter=Email eq '{email}'&$top=5&$select=Id,FirstName,LastName,PrimaryAliasId`\n- Used to find an existing Rock person by email before creating a new one.\n- Returns a bare JSON array. Empty array means no match.\n- **Gotcha:** OData requires escaping single quotes by doubling them. `o'malley@example.com` must be sent as `o''malley@example.com` in the filter, or the filter will be invalid and Rock returns 400.\n\n**2. Phone dedup** (only if email dedup misses)\n\n- `GET /api/People?$filter=PhoneNumbers/any(p: p/Number eq '{digits}')&$top=5&$select=Id,FirstName,LastName,PrimaryAliasId`\n- Strip phone to digits only (`5552011001`, no formatting, no `+1`).\n- Returns a bare JSON array. The OData `any` filter on the `PhoneNumbers` related collection is confirmed working on Rock 18.1.0.0.\n- **Gotcha:** Rock stores some phone numbers with the country code prefixed (`15552011001`). A 10-digit search will not match an 11-digit stored number. Document as a known limitation in v1.\n\n**3. Create Rock person** (only if both dedup searches miss)\n\n- `POST /api/People`\n- Payload fields (v1): `FirstName`, `LastName`, `Email`, `RecordTypeValueId`, `RecordStatusValueId` (use the `active_status_id` from `account_metadata['rockrms']`), `ConnectionStatusValueId` (use the `visitor_id` from `account_metadata['rockrms']`).\n- `RecordTypeValueId`: Resolve at connect time via `self._resolve_guid('36CF452D-9E4A-4CB3-ADD6-52D5BE61C5CB')` and cache as `account_metadata['rockrms']['person_record_type_id']`. The integer Id for this GUID varies by Rock installation — always resolve via the GUID lookup and read from `rock_meta['person_record_type_id']`; never hardcode the integer. **Verify** by running `GET /api/DefinedValues?$filter=Guid eq guid'36CF452D-9E4A-4CB3-ADD6-52D5BE61C5CB'&$select=Id` on `saltlight.rockcloud.com` before using.\n- **Response shape:** Rock returns a **bare integer** (the new Person Id, e.g. `20`) with HTTP 201. NOT `{\"Id\": 20}`. NOT a dict. Read the return value directly — do not call `.get('Id')` on it. Same pattern as `POST /api/Workflows`.\n- **Phone is NOT included in this payload.** Rock's People endpoint does not accept a direct phone field on create or update; phone numbers live on the separate `/api/PhoneNumbers` sub-resource. Phone-on-create is deferred to v2. v1 creates the person without phone and logs a warning if a phone was on the card.\n\n**4. Update Rock person** (only if dedup found a match)\n\n- `PATCH /api/People/{id}`\n- Payload: only the fields present on the card AND non-blank. Allowed fields: `FirstName`, `LastName`, `Email`. Phone is excluded (see #3).\n- Returns HTTP 204 with no body.\n- **Never overwrite with blanks.** Build the payload by including only fields where the card has a non-empty value.\n\n**5. Apply tags** (loop over `writeback_tag_ids` array)\n\n- Get the Rock person's Guid and PrimaryAliasId: `GET /api/People/{rock_person_id}?$select=Id,Guid,PrimaryAliasId`. Fetch this once and pass both values to both the tag step (step 5) and the workflow step (step 6) — do not repeat this Rock API call for each step.\n- For **each** `tag_id` in `cfg.get('writeback_tag_ids', [])`: `POST /api/TaggedItems` with payload `{\"TagId\": <tag_id>, \"EntityGuid\": \"<person_guid>\", \"EntityTypeId\": 15}`.\n- `EntityTypeId: 15` is the Person entity type and is required — omitting it returns HTTP 500.\n- Rock does NOT return 409 on duplicate tags — it creates a duplicate `TaggedItem` row (Rock deduplicates on display). Duplicate tags are harmless, so no pre-check needed.\n- If `writeback_tag_ids` is empty or absent, skip this step entirely.\n\n**6. Create workflow instances** (loop over `writeback_workflow_type_ids` array)\n\n- For **each** `wf_type_id` in `cfg.get('writeback_workflow_type_ids', [])`:\n- `POST /api/Workflows` with payload `{\"WorkflowTypeId\": <wf_type_id>, \"Name\": \"SaltLight Guest - Card Capture\", \"InitiatorPersonAliasId\": <primary_alias_id>, \"Status\": \"Active\"}`.\n- **Response shape:** bare integer (the new Workflow Id), HTTP 201. NOT a dict. Read directly.\n- Then set AttributeValues (step 7) for each created workflow instance.\n- If `writeback_workflow_type_ids` is empty or absent, skip this step entirely.\n\n**7. Set workflow attribute values**\n\nFor each `(attribute_id, value)` pair derived from the card data and the `attribute_ids` lookup from `account_metadata['rockrms']['mapped_forms']`:\n\n- Check whether an `AttributeValue` row already exists: `GET /api/AttributeValues?$filter=EntityId eq {workflow_id} and AttributeId eq {attribute_id}&$select=Id`. Returns a bare array.\n- If a row exists: `PATCH /api/AttributeValues/{id}` with payload `{\"Value\": \"<value as string>\"}`. Returns HTTP 204.\n- If no row exists: `POST /api/AttributeValues` with payload `{\"EntityId\": <workflow_id>, \"AttributeId\": <attribute_id>, \"Value\": \"<value as string>\"}`. Returns a bare integer (new AttributeValue Id), HTTP 201.\n- **Gotcha:** Rock creates AttributeValue rows lazily — they do NOT pre-exist on a newly created workflow. `POST /api/Workflows/{id}/SetAttributeValue` returns 404 on Rock 18.1.0.0; do not use it.\n- All values are sent as strings. Cast ints, IDs, and names with `str(value)`.\n\n### Field name migration note\n\n> **Kenneth:** The CareFlow Rock config (`workflow_data['rockrms']`) now stores `writeback_tag_ids` (int array) and `writeback_workflow_type_ids` (int array) — plural, array-valued. Any existing code that reads `writeback_tag_id` (singular int) or `writeback_workflow_type_id` (singular int) must be updated to iterate over the new array fields. The feature write-back loops in this spec use `cfg.get('writeback_tag_ids', [])` and `cfg.get('writeback_workflow_type_ids', [])`. If an existing field has the singular name in the DB for any existing CareFlow, a one-time migration is needed to rename and convert to arrays.\n\n### Source guard\n\nThe following `connect_card.connect_card_data.source` values mean the card originated from Rock and must never be pushed back (avoids an echo loop):\n\n- `rock_track1` (People poll)\n- `rock_track2` (Workflow poll)\n- `rock_webhook` (inbound webhook, reserved)\n\nCompare case-insensitively. Anything else (`card_capture`, `manual`, web form sources, etc.) is eligible for push.\n\n### DB state machine\n\n`connect_card.rock_sync_status` is a TEXT column with these states:\n\n| State | Meaning | Set by |\n|---|---|---|\n| `NULL` | Rock sync not applicable (no Rock integration, OR card source is Rock-originated, OR card has no email AND no phone) | Default; never updated for ineligible cards |\n| `'pending'` | Sync needed — initial attempt failed | Trigger function on Rock API failure |\n| `'synced'` | Sync completed successfully | Trigger function or retry sweep on success |\n| `'failed'` | Exceeded 10 total attempts — alert raised | Retry sweep when `attempts >= 10` |\n\n**Transitions:**\n\n- `NULL → pending`: first attempt failed. Set `rock_sync_attempts = 1`, `rock_sync_last_attempted = NOW()`.\n- `NULL → synced`: first attempt succeeded. Set `rock_sync_attempts = 1`, `rock_sync_last_attempted = NOW()`.\n- `pending → synced`: retry succeeded. Increment attempts, set last_attempted.\n- `pending → pending`: retry failed but attempts < 10. Increment attempts, set last_attempted.\n- `pending → failed`: retry failed and attempts >= 10. Increment attempts, set last_attempted, send alert.\n\n**Guard against demotion:** any UPDATE that flips status to `'pending'` MUST include `WHERE rock_sync_status IS NULL OR rock_sync_status = 'pending'`. A `'synced'` or `'failed'` card must never be silently flipped back to `'pending'` by a re-trigger.\n\n**Attempt counter semantics:** the initial trigger writes `rock_sync_attempts = 1` on failure (counting the just-failed attempt). Each retry reads the existing value, increments by 1, and writes back. The 10-attempt threshold is checked against the post-increment value: when the just-completed attempt was the 10th and it failed, status flips to `'failed'`.\n\n**New DB columns needed** (add via migration):\n\n```sql\nALTER TABLE public.connect_card\n  ADD COLUMN rock_sync_status TEXT DEFAULT NULL,\n  ADD COLUMN rock_sync_attempts INTEGER DEFAULT 0,\n  ADD COLUMN rock_sync_last_attempted TIMESTAMP WITH TIME ZONE DEFAULT NULL;\n```\n\n**Also add these indexes for dedup query performance:**\n\n```sql\nCREATE INDEX CONCURRENTLY idx_connect_card_rock_sync_status\n    ON public.connect_card (account_id, rock_sync_status)\n    WHERE rock_sync_status IS NOT NULL;\n```\n\nThis index supports the retry sweep's `WHERE account_id = %s AND rock_sync_status = 'pending'` query. The `WHERE IS NOT NULL` partial index keeps it small — most cards are never synced to Rock.\n\n### Trigger point\n\nThe sync fires inline at the end of `connect_card_item_processing()` in `tf/lambda_functions/ai_handler/src/connect_card_tools.py`, **after** `associate_card_to_workflow` has run. At that point both `connect_card_id` and `workflow_id` are in scope.\n\nSequence inside the trigger:\n\n1. Source guard — exit if `card_data['source']` is in `ROCK_SOURCES`.\n2. Identifying-info guard — exit if both email and phone are blank or missing. Log a warning. Leave `rock_sync_status = NULL`.\n3. Load the account's `account_metadata['rockrms']` via `self.get_connection()`. If not connected (returns None), exit (leave `rock_sync_status = NULL`).\n4. Load the CareFlow's `workflow_data['rockrms']` for this `workflow_id`. If no Rock config, exit (leave `rock_sync_status = NULL`). The `attribute_ids` for field mapping are in `account_metadata['rockrms']['mapped_forms']` (Feature 1b), looked up by `workflow_type_id`.\n5. Attempt the full sync (email dedup → phone dedup → create/update → tag → workflow → attribute values).\n6. On success: UPDATE `connect_card` SET `rock_sync_status = 'synced'`, `rock_sync_attempts = 1`, `rock_sync_last_attempted = NOW()` WHERE `connect_card_id = %s` AND (`rock_sync_status IS NULL OR rock_sync_status = 'pending'`).\n7. On failure: UPDATE same row to `rock_sync_status = 'pending'`, `rock_sync_attempts = 1`, `rock_sync_last_attempted = NOW()` (same WHERE guard). Log the exception. Do not raise — the CareFlow must proceed.\n\nThe sync runs synchronously in the calling Lambda. It is not dispatched to SQS in v1.\n\n### Retry sweep\n\nRuns at the end of `_poll_rock_account()` in the Rock poll Lambda, after both Track 1 and Track 2 loops complete.\n\n**Query for pending cards** (note: `workflow_id` lives on `interaction`, NOT on `connect_card` — JOIN through `interaction`):\n\n```sql\n-- DISTINCT ON prevents a card matched to multiple CareFlows from being synced\n-- multiple times per sweep cycle. Without it, one pending card with 3 CareFlows\n-- would appear 3 times and create 3 Rock workflow instances per sweep.\nSELECT DISTINCT ON (cc.connect_card_id)\n    cc.connect_card_id, cc.connect_card_data, cc.rock_sync_attempts, i.workflow_id\nFROM public.connect_card cc\nJOIN public.interaction i ON i.connect_card_id = cc.connect_card_id\nWHERE cc.account_id = %s\n  AND cc.rock_sync_status = 'pending'\nORDER BY cc.connect_card_id, cc.rock_sync_attempts DESC\nLIMIT 50;\n-- Note: DISTINCT ON requires the DISTINCT ON expression to appear first in ORDER BY.\n-- DESC on rock_sync_attempts means highest-attempt cards (closest to the failed threshold)\n-- are selected when multiple interaction rows exist for the same card.\n```\n\n`ORDER BY cc.connect_card_id, cc.rock_sync_attempts DESC` — `DISTINCT ON` collapses multiple interaction rows per card to one. `DESC` on attempts means the highest-attempt card is selected when duplicates exist, and the sweep processes cards closest to the alert threshold first.\n\n**For each pending card:**\n\n1. Re-attempt the full sync using the same code path as the initial trigger.\n2. Read current `rock_sync_attempts`, compute `new_attempts = attempts + 1`.\n3. On success: UPDATE `rock_sync_status = 'synced'`, `rock_sync_attempts = new_attempts`, `rock_sync_last_attempted = NOW()` WHERE `connect_card_id = %s AND (rock_sync_status IS NULL OR rock_sync_status = 'pending')`.\n4. On failure with `new_attempts < 10`: UPDATE `rock_sync_status = 'pending'`, `rock_sync_attempts = new_attempts`, `rock_sync_last_attempted = NOW()` WHERE `connect_card_id = %s AND (rock_sync_status IS NULL OR rock_sync_status = 'pending')`.\n5. On failure with `new_attempts >= 10`: UPDATE `rock_sync_status = 'failed'`, `rock_sync_attempts = new_attempts`, `rock_sync_last_attempted = NOW()` WHERE `connect_card_id = %s AND (rock_sync_status IS NULL OR rock_sync_status = 'pending')`, then emit an alert to the SaltLight internal team channel.\n\n   > **Alert mechanism:** Check the codebase for an existing alerting utility (look for `notify_internal_team()`, `send_ops_alert()`, or an SNS publish wrapper in `shared/utils/` or `shared/integrations/`). If one exists, call it with the message: `f\"Rock sync failed for {connect_card_id} after {new_attempts} attempts (account {account_id})\"`. If no utility exists, publish to the SNS topic used by other Lambda error alerts in the same environment — ask Kris or check the Lambda environment variables for an `OPS_SNS_TOPIC_ARN` or similar. Do NOT raise an exception or log only — the alert must reach the ops channel.\n\nThe retry function must be called with the `rock_meta` dict obtained via `self.get_connection()` on the integration base class. There is no `get_account_metadata()` helper on the base class; do not call it.\n\n### Poll schedule\n\nThe poll Lambda must check `_should_poll_now()` at the top of its handler. The schedule lives on `account_metadata['rockrms']['poll_schedule']`:\n\n```json\n{\n  \"high_frequency_days\": [5, 6],\n  \"high_frequency_start\": \"15:00\",\n  \"high_frequency_end\": \"21:00\",\n  \"low_frequency_interval_hours\": 12,\n  \"timezone\": \"America/Chicago\"\n}\n```\n\n- `high_frequency_days` uses Python `datetime.weekday()` values (Mon=0, Sun=6). `[5, 6]` is Sat/Sun.\n- During the high-frequency window on a high-frequency day, the poll runs every EventBridge tick (every 5 min in the EventBridge rule).\n- Outside that window, the poll runs only if `(now - last_polled) >= low_frequency_interval_hours`.\n\n**`_should_poll_now()` returns True/False.** It must be wired into the handler, not left as a comment. If False, the handler returns early without polling.\n\n**`last_polled` write-back:** at the end of every successful poll (including no-op polls), `_update_poll_cursor()` must update `account_metadata['rockrms']['last_polled']` alongside `poll_cursor_track1` and `poll_cursor_track2`. Without this, the low-frequency interval can never be calculated correctly.\n\n**Timezone — v1 vs v2:**\n\n- **v1:** stored times (`high_frequency_start`, `high_frequency_end`) and `last_polled` are in **UTC**. The `timezone` field is stored but unused. US churches think in local time, but v1 compares against `datetime.utcnow()`. Document this in the connect-time UI so admins enter UTC values.\n- **v2:** honor the `timezone` field. Convert `now` to the church's local time before comparing.\n\n### Known limitations (v2 items)\n\n- **Phone on create:** v1 cannot include phone in `POST /api/People`. Rock requires the `PhoneNumbers` sub-endpoint for phone changes. v2 will add a follow-up `POST /api/PhoneNumbers` after person create.\n- **Phone match by digits:** v1 phone dedup uses digit-only matching. If Rock stored the number with a country-code prefix (`15552011001`), a 10-digit card phone (`5552011001`) will not match. v2 may try both forms.\n- **Timezone:** v1 treats poll-schedule times and `last_polled` as UTC. v2 honors `poll_schedule['timezone']`.\n- **Partial-sync idempotency:** if person-create succeeds but Lambda times out before the tag or workflow is created, the retry will dedup-match the person (good), apply the tag again (harmless — Rock allows duplicate `TaggedItem` rows), and create a **second workflow instance** (BAD — duplicate workflow). v1 accepts this risk. v2 will store the created `rock_workflow_id` on `connect_card` after step 6 succeeds and skip workflow creation on retry if it's already set.\n- **Synchronous sync in trigger:** the full sync runs inline in the calling Lambda. If Rock is slow, the caller can approach timeout. v2 may dispatch to SQS FIFO for high-volume events.\n- **Partial-sync NULL-status gap:** If Lambda times out after the Rock sync succeeds (person created, tags applied, workflows created) but BEFORE the `UPDATE connect_card SET rock_sync_status = 'synced'` executes, `rock_sync_status` stays `NULL`. The retry sweep only picks up `'pending'` cards — a `NULL` card is invisible to it and will never be retried. The next inline trigger (if the card is re-submitted) will re-attempt via email dedup (finding the existing person), but if no re-submission happens, the card is silently un-synced. v2 mitigation: write `rock_sync_status = 'pending'` immediately before the Rock API calls begin (optimistic mark), then update to `'synced'` or leave as `'pending'` on completion.\n\n### Known gotchas\n\n- `POST /api/People` returns a **bare integer**, not a dict. Use the return value directly. Calling `.get('Id')` on an int will raise.\n- `POST /api/Workflows` returns a **bare integer** — same pattern.\n- `POST /api/AttributeValues` returns a **bare integer**.\n- `PATCH /api/People/{id}` and `PATCH /api/AttributeValues/{id}` return HTTP 204 with no body.\n- `POST /api/TaggedItems` requires `EntityTypeId: 15` for Person. Omitting it returns HTTP 500.\n- Rock does not return 409 on duplicate tags — it creates duplicate `TaggedItem` rows. No pre-check needed.\n- OData filters with single-quoted strings must escape internal apostrophes by doubling them (`o''malley`).\n- Phone dedup must strip the input to digits-only before building the filter.\n- `connect_card` does NOT have a `workflow_id` column. The retry sweep MUST JOIN through `interaction` to recover the workflow id for each pending card.\n- The integration base class exposes `self.get_connection()` (returns the `rockrms` sub-dict from `account_metadata`, or None). There is no `get_account_metadata()` helper — do not call it.\n\n---\n\n## Reference implementation (optional)\n\n> Kenneth — this is one way to wire the above. Skip if you prefer to write your own code.\n\n```python\n# shared/integrations/rockrms.py\n\ndef sync_saltlight_card_to_rock(\n    self,\n    connect_card_id: str,\n    workflow_id: str,\n    card_data: dict,\n) -> dict:\n    \"\"\"\n    Push a SaltLight-captured card to Rock. Idempotent for the dedup-match path;\n    see 'partial-sync idempotency' v2 note for the duplicate-workflow edge case.\n\n    Returns: {'success': bool, 'rock_person_id': int|None, 'rock_workflow_id': int|None}\n    Raises:  nothing — caller decides whether to mark pending or failed.\n    \"\"\"\n    # 1. Source guard\n    # 2. Identifying-info guard (email or phone required)\n    # 3. Load account connection: rock_meta = self.get_connection(); if not rock_meta: return failure result\n    # 4. Load CareFlow Rock config from workflow_data['rockrms']\n    # 5. Email dedup -> phone dedup -> create OR update person\n    # 6. For each tag_id in cfg.get('writeback_tag_ids', []): POST /api/TaggedItems\n    # 7. For each wf_type_id in cfg.get('writeback_workflow_type_ids', []): POST /api/Workflows + set AttributeValues\n    # 8. Return ids on success; raise on Rock API failures so caller can mark pending\n    ...\n\n\n# ai_handler/src/connect_card_tools.py — at end of connect_card_item_processing()\n\ndef _trigger_rock_sync_if_configured(connect_card_id, workflow_id, card_data, account_id):\n    \"\"\"\n    Inline trigger called after associate_card_to_workflow.\n    Catches all exceptions — Rock failure must never block the CareFlow.\n\n    DB writes:\n      - On success: UPDATE connect_card SET rock_sync_status='synced',\n            rock_sync_attempts=1, rock_sync_last_attempted=NOW()\n        WHERE connect_card_id=%s\n          AND (rock_sync_status IS NULL OR rock_sync_status='pending')\n\n      - On failure: same UPDATE but status='pending'\n    \"\"\"\n    ...\n\n\n# orchestrator/src/rockrms.py — end of _poll_rock_account()\n\ndef _retry_pending_rock_syncs(account_id, rock_meta):\n    \"\"\"\n    Picks up cards in 'pending' state, retries each, increments attempts,\n    marks 'failed' + alerts at attempts >= 10.\n\n    Query JOINs connect_card -> interaction to recover workflow_id.\n    Batch size: 50, ORDER BY cc.connect_card_id, cc.rock_sync_attempts DESC.\n    \"\"\"\n    ...\n\n\n# orchestrator/src/rockrms.py — top of rock_poll_handler\n\ndef _should_poll_now(rock_meta) -> bool:\n    \"\"\"\n    v1: compares datetime.utcnow() against poll_schedule times (treated as UTC).\n    v2: honor poll_schedule['timezone'].\n\n    Logic:\n      - If today's weekday() in high_frequency_days AND now within\n        [high_frequency_start, high_frequency_end]: return True\n      - Else: return (now - last_polled) >= low_frequency_interval_hours\n      - If last_polled is missing: return True (first poll)\n    \"\"\"\n    ...\n\n\ndef _update_poll_cursor(account_id, rock_meta, new_cursor_track1, new_cursor_track2):\n    \"\"\"\n    Updates poll_cursor_track1, poll_cursor_track2, AND last_polled\n    in account_metadata['rockrms'] in a single jsonb_set chain.\n    \"\"\"\n    ...\n```\n\n---\n\n## Implementation upgrade notes\n\n> **Kenneth — read this before modifying the existing `rockrms.py` implementation.** These are known bugs in the existing code that must be fixed as part of Feature 4:\n\n1. **`_create_rock_person()` — remove any `isinstance(response, dict)` check.** `POST /api/People` always returns a bare integer on Rock 18.1.0.0. Delete any branch that does `response.get('Id')` — calling `.get()` on an integer raises `AttributeError`. The return line must simply be `return response`.\n\n2. **`_create_rock_person()` — do NOT hardcode `RecordTypeValueId: 1` or `RecordStatusValueId: 3`.** These integer IDs are install-specific. Read them from `rock_meta['person_record_type_id']` and `rock_meta['active_status_id']` respectively (stored at connect time by Feature 1).\n\n3. **Do NOT call `self.get_account_metadata()` anywhere.** This method does not exist on the base integration class. Use `self.get_connection()` — it returns the `rockrms` sub-dict from `account_metadata`, or None if not connected.\n\n4. **`sync_saltlight_card_to_rock()` — read `attribute_ids` from `mapped_forms`, not from the CareFlow config.** If the existing code does `attribute_ids = careflow_rock_config.get('attribute_ids', {})`, that is the old architecture. Replace with the `form_map` lookup: `mapped_forms = rock_meta.get('mapped_forms', []); form_map = {f['workflow_type_id']: f['attribute_ids'] for f in mapped_forms}; attr_ids = form_map.get(cfg['workflow_type_id'])`.\n\n5. **`_trigger_rock_sync_if_configured()` — add demotion guard to the success update and the failure update.** Every UPDATE that sets `rock_sync_status` must include `WHERE rock_sync_status IS NULL OR rock_sync_status = 'pending'`. A card with `rock_sync_status = 'synced'` or `'failed'` must never be flipped back to `'pending'` by a re-trigger. Add this guard to both UPDATE statements.\n\n6. **`_retry_pending_rock_syncs()` — use the DISTINCT ON query with JOIN through `interaction`.** The `connect_card` table has no `workflow_id` column. Any query that does `SELECT cc.workflow_id FROM public.connect_card cc` will fail with column-not-found. Use the locked DISTINCT ON query shown in the \"Retry sweep\" section above.\n\n7. **`_retry_pending_rock_syncs()` — pass `rock_meta` (the sub-dict), not `account_metadata` (the full dict).** The function receives `rock_meta` from `_poll_rock_account`. Do not pass `account_metadata` and then do `account_metadata.get('rockrms', {})` inside — that nesting produces an empty dict because `account_metadata` at the call site is already the sub-dict.\n"}, {"label": "Rock API Reference", "content": "# Rock API Reference\n\n## Overview\n\nThis document is the canonical Rock RMS API reference for the SaltLight integration. It covers every Rock endpoint called across Features 1, 1b, 2, 3, and 4 — organized by resource type, not feature. The base URL for all calls is `https://{domain}/api/...` where `{domain}` is the church's Rock hostname stored in `account_metadata['rockrms']['domain']`. All requests authenticate via the `Authorization-Token` header using the admin's REST API key. Rock 18.1.0.0 is the confirmed target version (tested against `saltlight.rockcloud.com`).\n\n---\n\n## Reference Data\n\n### GUIDs (Portable Identifiers)\n\nThese GUIDs are the same on every Rock install. SaltLight resolves each one to its install-local integer ID at connect time and caches the result. **Never hardcode the integer** — always resolve via `_resolve_guid()` and read from `account_metadata['rockrms']`.\n\n| Concept | GUID | Test Env Integer | Cached As |\n|---|---|---|---|\n| Visitor ConnectionStatus | `B91BA046-BC1E-400C-B85D-638C1F4E0CE2` | `66` | `rock_meta['visitor_id']` |\n| Mobile PhoneType | `F1A30C23-EC3B-4BCD-8CBC-6928F15E7223` | `12` | `rock_meta['mobile_id']` |\n| Active RecordStatus | `618F906C-C33D-4FA3-8AEF-E58CB7B63F1E` | `3` | `rock_meta['active_status_id']` |\n| Person RecordType | `36CF452D-9E4A-4CB3-ADD6-52D5BE61C5CB` | verify on test env | `rock_meta['person_record_type_id']` |\n\n> ⚠️ **Verify Mobile PhoneType GUID** against `saltlight.rockcloud.com` before treating it as ground truth.\n> ⚠️ **Verify Person RecordType GUID** — run `GET /api/DefinedValues?$filter=Guid eq guid'36CF452D-9E4A-4CB3-ADD6-52D5BE61C5CB'&$select=Id` on test env.\n\n---\n\n### FieldTypeId Reference\n\nFieldTypeIds appear on Attribute records from `/api/Attributes`. SaltLight uses them to load filter values (Feature 2 Step 6) and interpret AttributeValues from Workflow submissions (Feature 3).\n\n| FieldTypeId | Type Name | How SaltLight Uses It |\n|---|---|---|\n| `1` | Text | Raw string. No transformation. Used for name/phone fields in Workflow AttributeValues. |\n| `5` | Single Select (DefinedValue) | Read `definedtypeguid` qualifier → resolve to DefinedTypeId → call `/api/DefinedValues?$filter=DefinedTypeId eq {id}` |\n| `6` | Value List | Parse pipe-delimited `values` qualifier string. Labels already human-readable — no lookup. |\n| `16` | Multi Select (DefinedValue) | Same as FieldTypeId 5 — resolve via `definedtypeguid`. |\n| `30` | Campus Picker | Value stores `Campus.Id` as string integer (e.g. `\"1\"`). Resolve name from `rock_meta['campuses']` — no Rock call. |\n| `53` | Campus Picker (alternate) | Same as FieldTypeId 30. No `definedtypeguid` qualifier — use cached campuses only. |\n| `71` | Email | Raw string. Identical to Text (FieldTypeId 1) in this integration. |\n\n---\n\n## Endpoints by Category\n\n---\n\n### People\n\n#### `GET /api/People/GetCurrentPerson`\n\n**Purpose:** Verify API key validity and that the backing Rock user has People read access. Used as the permissions probe during Feature 1 account connection.\n\n**Response:**\n- HTTP 200 — single Person object; key field: `Id`\n- HTTP 401 — valid key but user account lacks People read permissions\n\n---\n\n#### `GET /api/People` (list with OData filters)\n\n**Purpose A — Track 1 poll (Feature 3):** Fetch Person records modified after a cursor timestamp.\n\n```\nGET /api/People?$filter=ModifiedDateTime gt datetime'2026-05-24T15:00:00Z'\n    &$expand=PhoneNumbers\n    &$orderby=ModifiedDateTime asc\n    &$top=100\nAuthorization-Token: {api_key}\n```\n\n**Purpose B — Email dedup (Feature 4):**\n\n```\nGET /api/People?$filter=Email eq 'james.wilson@example.com'\n    &$top=5\n    &$select=Id,FirstName,LastName,PrimaryAliasId\nAuthorization-Token: {api_key}\n```\n\n> Escape apostrophes in email by doubling: `o'malley` → `o''malley`\n\n**Purpose C — Phone dedup (Feature 4):** (when email dedup returns nothing)\n\n```\nGET /api/People?$filter=PhoneNumbers/any(p: p/Number eq '5552011001')\n    &$top=5\n    &$select=Id,FirstName,LastName,PrimaryAliasId\nAuthorization-Token: {api_key}\n```\n\n> Phone number must be digits only — no formatting, no `+1`.\n\n**Response shape:** Bare JSON array `[...]` — run through `_to_list()`.\n\nKey fields per Person:\n\n| Field | Type | Notes |\n|---|---|---|\n| `Id` | int | Install-specific Person ID |\n| `FirstName`, `LastName` | string | |\n| `Email` | string | |\n| `PrimaryAliasId` | int | Required for tag and Workflow creation |\n| `PrimaryCampusId` | int\\|null | Scalar only — `$expand=Campus` silently ignored |\n| `ConnectionStatusValueId` | int | e.g. `66` = Visitor |\n| `ModifiedDateTime` | string | ISO-8601 UTC — Track 1 cursor |\n| `PhoneNumbers` | array | Only present with `$expand=PhoneNumbers`. Each: `{Number, NumberTypeValueId}`. `Number` is digits-only. |\n\n⚠️ Do **NOT** combine `$select` with `$expand=PhoneNumbers` — `$select` silently strips the PhoneNumbers collection.\n\n---\n\n#### `POST /api/People`\n\n**Purpose:** Create a new Rock Person when no email/phone match found. Used by Feature 4.\n\n**Request body:**\n\n```json\n{\n  \"FirstName\": \"James\",\n  \"LastName\": \"Wilson\",\n  \"Email\": \"james.wilson@example.com\",\n  \"RecordTypeValueId\": 1,\n  \"RecordStatusValueId\": 3,\n  \"ConnectionStatusValueId\": 66\n}\n```\n\n> Use `rock_meta['person_record_type_id']`, `rock_meta['active_status_id']`, `rock_meta['visitor_id']` — never hardcode integers.\n\n**Response:** Bare integer (new Person Id) with HTTP 201. ⚠️ NOT a dict — do NOT call `.get('Id')`.\n\n---\n\n#### `PATCH /api/People/{id}`\n\n**Purpose:** Update non-blank fields on existing Person. Used by Feature 4 after dedup match.\n\nAllowed fields: `FirstName`, `LastName`, `Email`. Phone excluded (v2 item). Never overwrite with blanks.\n\n**Response:** HTTP 204, no body.\n\n---\n\n#### `GET /api/People/{id}`\n\n**Purpose:** Fetch `Guid` and `PrimaryAliasId` after create or update. Both are needed for tags + Workflows — fetch once and reuse. ⚠️ `$select` ignored on single-record GETs.\n\n---\n\n### Person Aliases\n\n#### `GET /api/PersonAliases/{aliasId}`\n\n**Purpose:** Resolve a `PersonAliasId` to a `PersonId`. Used by Feature 3 Track 2 when `InitiatorPersonAliasId` is non-null.\n\n⚠️ All 5 test Workflow fixtures have `InitiatorPersonAliasId: null` — handle null gracefully in all code paths.\n\n---\n\n### Tags\n\n#### `GET /api/Tags`\n\n**Purpose:** Load Person Tags list for CareFlow Step 6 write-back multi-select. Used by Feature 2.\n\n```\nGET /api/Tags?$filter=EntityTypeId eq 15&$select=Id,Name&$orderby=Name asc\nAuthorization-Token: {api_key}\n```\n\n**Response:** Bare JSON array. Each element: `{Id, Name}`.\n\n---\n\n#### `POST /api/TaggedItems`\n\n**Purpose:** Apply a Tag to a Person at card capture. Called once per `tag_id` in `cfg.get('writeback_tag_ids', [])`. Used by Feature 4.\n\n```json\n{\n  \"TagId\": 42,\n  \"EntityGuid\": \"a1b2c3d4-e5f6-7890-abcd-ef1234567890\",\n  \"EntityTypeId\": 15\n}\n```\n\n⚠️ `EntityTypeId: 15` is **required** — omitting it returns HTTP 500.\nℹ️ Rock silently creates duplicate rows on repeat applies — harmless.\n\n---\n\n### Workflows and Forms\n\n#### `GET /api/WorkflowTypes`\n\n**Purpose:** Load active Rock WorkflowTypes. Used by Feature 1b (form selection checklist) and Feature 2 (write-back Workflows multi-select — show ALL active types, not just mapped forms).\n\n```\nGET /api/WorkflowTypes?$filter=IsActive eq true&$select=Id,Name&$orderby=Name asc\nAuthorization-Token: {api_key}\n```\n\n**Response:** Bare JSON array. Each element: `{Id, Name}`.\n\n---\n\n#### `GET /api/Workflows` (list — Track 2 poll)\n\n**Purpose:** Fetch completed Workflow instances for a configured WorkflowTypeId after a cursor. Used by Feature 3 Track 2.\n\n```\nGET /api/Workflows?$filter=WorkflowTypeId eq 24\n    and Status eq 'Completed'\n    and CreatedDateTime gt datetime'2026-05-24T15:00:00Z'\n    &$orderby=CreatedDateTime asc\n    &$top=100\nAuthorization-Token: {api_key}\n```\n\n**Response:** Bare JSON array. Key fields: `Id`, `WorkflowTypeId`, `Status`, `InitiatorPersonAliasId` (nullable), `CreatedDateTime`, `CampusId`.\n\n⚠️ Do NOT use `$expand=AttributeValues` on `/api/Workflows` — returns HTTP 400. Fetch AttributeValues separately via `/api/AttributeValues`.\n\n---\n\n#### `POST /api/Workflows`\n\n**Purpose:** Create a write-back Workflow at card capture. Called once per `wf_type_id` in `cfg.get('writeback_workflow_type_ids', [])`. Used by Feature 4.\n\n```json\n{\n  \"WorkflowTypeId\": 24,\n  \"Name\": \"SaltLight Guest - Card Capture\",\n  \"InitiatorPersonAliasId\": 47,\n  \"Status\": \"Active\"\n}\n```\n\n**Response:** Bare integer (new Workflow Id) with HTTP 201. ⚠️ NOT a dict.\n\n---\n\n### Attribute Values\n\n#### `GET /api/AttributeValues` (batch fetch — Feature 3)\n\n**Purpose:** Batch-fetch all AttributeValues for a set of AttributeIds across all Workflow instances in a Track 2 batch.\n\n```\nGET /api/AttributeValues?$filter=AttributeId eq 8281\n    or AttributeId eq 8282\n    or AttributeId eq 8283\n    or AttributeId eq 8284\n    or AttributeId eq 8285\n    &$select=AttributeId,EntityId,Value\n    &$top=5000\nAuthorization-Token: {api_key}\n```\n\n**Response:** Bare JSON array. Each: `{AttributeId, EntityId, Value}`. Group by `EntityId == wf['Id']`.\n\nValue formats: Text (1) = raw string, Value List (6) = human label, CampusPicker (30/53) = string integer like `\"1\"` → resolve via `rock_meta['campuses']`.\n\n---\n\n#### `GET /api/AttributeValues` (existence check — Feature 4)\n\n**Purpose:** Determine whether to POST (create) or PATCH (update) an AttributeValue for a workflow.\n\n```\nGET /api/AttributeValues?$filter=EntityId eq 7 and AttributeId eq 8281&$select=Id\nAuthorization-Token: {api_key}\n```\n\nEmpty array → POST. Non-empty → PATCH using returned `Id`.\n\n---\n\n#### `POST /api/AttributeValues`\n\n**Purpose:** Create AttributeValue on a Workflow. Rock does NOT pre-create these — always POST them.\n\n```json\n{\"EntityId\": 7, \"AttributeId\": 8281, \"Value\": \"James\"}\n```\n\nAll `Value` fields must be strings. **Response:** Bare integer with HTTP 201.\n\n⚠️ Do NOT use `POST /api/Workflows/{id}/SetAttributeValue` — returns 404 on Rock 18.1.0.0.\n\n---\n\n#### `PATCH /api/AttributeValues/{id}`\n\n**Purpose:** Update existing AttributeValue. Request body: `{\"Value\": \"James\"}`. **Response:** HTTP 204, no body.\n\n---\n\n### Reference Data\n\n#### `GET /api/DefinedValues`\n\n**Purpose A — GUID resolution at connect time:**\n\n```\nGET /api/DefinedValues?$filter=Guid eq guid'B91BA046-BC1E-400C-B85D-638C1F4E0CE2'&$select=Id\nAuthorization-Token: {api_key}\n```\n\n> The `guid'...'` prefix is **required** — bare UUID returns empty array. Empty array = GUID not found → fail the connection.\n\n**Purpose B — filter value loading (FieldTypeIds 5 and 16):**\n\n```\nGET /api/DefinedValues?$filter=DefinedTypeId eq {type_id}&$select=Id,Value&$orderby=Order asc\nAuthorization-Token: {api_key}\n```\n\nUse `Id` as stored filter `id`, `Value` as displayed `label`.\n\n---\n\n#### `GET /api/Attributes`\n\n**Purpose:** Load Attribute definitions for a WorkflowType. Used by Feature 1b (auto-suggest) and Feature 2 (filter attribute dropdown).\n\n```\nGET /api/Attributes?$filter=EntityTypeId eq 113\n    and EntityTypeQualifierColumn eq 'WorkflowTypeId'\n    and EntityTypeQualifierValue eq '24'\n    &$select=Id,Key,Name,FieldTypeId\nAuthorization-Token: {api_key}\n```\n\nEntityTypeId 113 = Workflow. **Response:** Bare JSON array. Each: `{Id, Key, Name, FieldTypeId}`.\n\n**Example response element:**\n```json\n{\"Id\": 8281, \"Key\": \"FirstName\", \"Name\": \"First Name\", \"FieldTypeId\": 1}\n```\n\n---\n\n#### `GET /api/Campuses`\n\n**Purpose:** Fetch and cache active campuses at connect time. Used by Feature 1.\n\n```\nGET /api/Campuses?$filter=IsActive eq true&$select=Id,Guid,Name,ShortCode\nAuthorization-Token: {api_key}\n```\n\n**Response:** Bare JSON array (NOT OData envelope). Run through `_to_list()`.\n\nSaltLight caches as `[{\"id\": 1, \"name\": \"Main Campus\"}, ...]` in `rock_meta['campuses']`. Confirmed test env: `[{Id:1, Name:\"Main Campus\"}, {Id:2, Name:\"North Campus\"}]`.\n\n---\n\n## Known Gotchas\n\n1. **All list endpoints return bare JSON arrays.** Live-tested on Rock 18.1.0.0: every list endpoint returns `[...]` — never the OData `{\"value\":[...]}` envelope. Always use `_to_list()`.\n\n2. **POST creates return bare integers, not dicts.** `POST /api/People`, `POST /api/Workflows`, `POST /api/AttributeValues` all return a bare integer (new record Id) with HTTP 201. Never call `.get('Id')` on these.\n\n3. **OData datetime filter requires `datetime'...'` wrapper.** Bare ISO-8601 in `$filter` returns HTTP 400. Always: `ModifiedDateTime gt datetime'2026-05-24T15:00:00Z'`.\n\n4. **OData GUID filter requires `guid'...'` prefix.** `Guid eq guid'618F906C-...'` — prefix required. Bare UUID returns empty array.\n\n5. **`$expand=Campus` on People is silently ignored.** No nested Campus object ever returned. Use `rock_meta['campuses']` only.\n\n6. **`$select` + `$expand=PhoneNumbers` silently strips PhoneNumbers.** Use `$expand=PhoneNumbers` alone when you need phone data.\n\n7. **`$expand=AttributeValues` on Workflows returns HTTP 400.** Always fetch via `/api/AttributeValues` separately.\n\n8. **CampusPicker AttributeValues are string integers, not names.** FieldTypeId 30/53 stores `\"1\"`, not `\"Main Campus\"`. Always resolve via `rock_meta['campuses']`.\n\n9. **Three distinct filter-value loading paths for Step 6.** FieldTypeIds 5/16: resolve `definedtypeguid` → `/api/DefinedValues`. FieldTypeId 6: parse pipe-delimited `values` qualifier. FieldTypeIds 30/53: use `rock_meta['campuses']` — no Rock call.\n\n10. **`POST /api/TaggedItems` requires `EntityTypeId: 15`.** Omitting returns HTTP 500. Duplicate applies silently create duplicate rows — harmless.\n\n11. **OData single-quoted strings require doubled apostrophes.** `o'malley@example.com` → `Email eq 'o''malley@example.com'`. Single apostrophe in filter value returns HTTP 400.\n\n12. **UTC timestamps must include the `Z` suffix.** Use `datetime.utcnow().isoformat() + 'Z'`. Without `'Z'`, cursor comparisons against timezone-aware datetimes raise `TypeError`.\n\n13. **`$select` is ignored on single-record GETs.** Always use `.get('FieldName')` defensively on single-record responses.\n\n14. **`POST /api/Workflows/{id}/SetAttributeValue` returns 404 on Rock 18.1.0.0.** Use check-then-POST-or-PATCH on `/api/AttributeValues` directly.\n"}];

// ─── MARKDOWN PARSER ─────────────────────────────────────────────────────────
function parseMarkdown(md) {
  const lines = md.split('\n');
  let html = '';
  let i = 0;

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function inlineFormat(s) {
    // Bold+italic ***text*** or ___text___
    s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    s = s.replace(/___(.+?)___/g, '<strong><em>$1</em></strong>');
    // Bold **text** or __text__
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/__(.+?)__/g, '<strong>$1</strong>');
    // Italic *text* or _text_ (not inside words)
    s = s.replace(/(?<!\w)\*(?!\s)(.+?)(?<!\s)\*(?!\w)/g, '<em>$1</em>');
    s = s.replace(/(?<!\w)_(?!\s)([^_]+?)(?<!\s)_(?!\w)/g, '<em>$1</em>');
    // Inline code `code`
    s = s.replace(/`([^`]+)`/g, (_, c) => '<code>' + escHtml(c) + '</code>');
    return s;
  }

  function processInline(s) {
    return inlineFormat(escHtml(s));
  }

  // Slugify for anchor IDs
  function slugify(text) {
    return text.toLowerCase()
      .replace(/[^a-z0-9\s-]/g, '')
      .replace(/\s+/g, '-')
      .replace(/-+/g, '-')
      .trim();
  }

  // Check if line is a table row
  function isTableRow(line) {
    return /^\s*\|/.test(line) && /\|\s*$/.test(line.trim() + (line.endsWith('|') ? '' : '|'));
  }

  // Actually just check for pipe
  function looksLikeTable(line) {
    return line.trim().startsWith('|') && line.includes('|', 1);
  }

  function isSeparatorRow(line) {
    return /^\s*\|[\s\|\-:]+\|\s*$/.test(line);
  }

  while (i < lines.length) {
    const line = lines[i];
    const trimmed = line.trim();

    // Fenced code block
    if (/^```/.test(trimmed)) {
      const lang = trimmed.slice(3).trim();
      let code = '';
      i++;
      while (i < lines.length && !/^```/.test(lines[i].trim())) {
        code += lines[i] + '\n';
        i++;
      }
      i++; // skip closing ```
      // Remove trailing newline
      code = code.replace(/\n$/, '');
      const langLabel = lang ? `<span class="code-lang-label">${escHtml(lang)}</span>` : '';
      html += `<pre>${langLabel}<code>${escHtml(code)}</code></pre>\n`;
      continue;
    }

    // HR: --- or *** or ___
    if (/^[-*_]{3,}\s*$/.test(trimmed)) {
      html += '<hr>\n';
      i++;
      continue;
    }

    // Headings
    const headingMatch = line.match(/^(#{1,4})\s+(.+)$/);
    if (headingMatch) {
      const level = headingMatch[1].length;
      const text = headingMatch[2];
      const id = slugify(text);
      html += `<h${level} id="${id}">${processInline(text)}</h${level}>\n`;
      i++;
      continue;
    }

    // Blockquote
    if (trimmed.startsWith('>')) {
      let bqLines = [];
      while (i < lines.length && lines[i].trim().startsWith('>')) {
        bqLines.push(lines[i].trim().replace(/^>\s?/, ''));
        i++;
      }
      // Parse inner content as paragraphs
      const inner = bqLines.join('\n');
      const innerParsed = inner.split(/\n\n+/).map(p => {
        const t = p.trim();
        if (!t) return '';
        return '<p>' + processInline(t.replace(/\n/g, ' ')) + '</p>';
      }).join('');
      html += `<blockquote>${innerParsed}</blockquote>\n`;
      continue;
    }

    // Table
    if (looksLikeTable(trimmed)) {
      // Collect table lines
      let tableLines = [];
      while (i < lines.length && looksLikeTable(lines[i].trim())) {
        tableLines.push(lines[i]);
        i++;
      }
      if (tableLines.length >= 2) {
        html += '<table>\n';
        let inBody = false;
        for (let ti = 0; ti < tableLines.length; ti++) {
          const tl = tableLines[ti].trim();
          if (isSeparatorRow(tl)) {
            html += '<tbody>\n';
            inBody = true;
            continue;
          }
          const cells = tl.split('|').slice(1, -1).map(c => c.trim());
          if (ti === 0 && !inBody) {
            html += '<thead><tr>\n';
            cells.forEach(c => { html += `  <th>${processInline(c)}</th>\n`; });
            html += '</tr></thead>\n';
          } else {
            html += '<tr>\n';
            cells.forEach(c => { html += `  <td>${processInline(c)}</td>\n`; });
            html += '</tr>\n';
          }
        }
        if (inBody) html += '</tbody>\n';
        html += '</table>\n';
      }
      continue;
    }

    // Unordered list
    if (/^[-*+]\s/.test(trimmed)) {
      html += '<ul>\n';
      while (i < lines.length) {
        const lt = lines[i].trim();
        if (/^[-*+]\s/.test(lt)) {
          const text = lt.replace(/^[-*+]\s+/, '');
          // Check for nested list on next line
          let itemHtml = processInline(text);
          let j = i + 1;
          let nested = '';
          // Handle simple nested lists (indented)
          while (j < lines.length && /^(\s{2,}|\t)[-*+]\s/.test(lines[j])) {
            const nt = lines[j].trim().replace(/^[-*+]\s+/, '');
            nested += `<li>${processInline(nt)}</li>\n`;
            j++;
          }
          if (nested) {
            html += `<li>${itemHtml}<ul>\n${nested}</ul></li>\n`;
            i = j;
          } else {
            html += `<li>${itemHtml}</li>\n`;
            i++;
          }
        } else if (lt === '') {
          i++;
          // Check if next non-empty line continues list
          let k = i;
          while (k < lines.length && lines[k].trim() === '') k++;
          if (k < lines.length && /^[-*+]\s/.test(lines[k].trim())) {
            i = k;
            continue;
          }
          break;
        } else {
          break;
        }
      }
      html += '</ul>\n';
      continue;
    }

    // Ordered list
    if (/^\d+\.\s/.test(trimmed)) {
      html += '<ol>\n';
      while (i < lines.length) {
        const lt = lines[i].trim();
        if (/^\d+\.\s/.test(lt)) {
          const text = lt.replace(/^\d+\.\s+/, '');
          html += `<li>${processInline(text)}</li>\n`;
          i++;
        } else if (lt === '') {
          i++;
          let k = i;
          while (k < lines.length && lines[k].trim() === '') k++;
          if (k < lines.length && /^\d+\.\s/.test(lines[k].trim())) {
            i = k;
            continue;
          }
          break;
        } else {
          break;
        }
      }
      html += '</ol>\n';
      continue;
    }

    // Empty line
    if (trimmed === '') {
      i++;
      continue;
    }

    // Paragraph — collect consecutive non-special lines
    let paraLines = [];
    while (i < lines.length) {
      const lt = lines[i].trim();
      if (lt === '') break;
      if (/^#{1,4}\s/.test(lt)) break;
      if (/^```/.test(lt)) break;
      if (/^[-*_]{3,}\s*$/.test(lt)) break;
      if (looksLikeTable(lt)) break;
      if (/^[-*+]\s/.test(lt)) break;
      if (/^\d+\.\s/.test(lt)) break;
      if (lt.startsWith('>')) break;
      paraLines.push(lines[i]);
      i++;
    }
    if (paraLines.length > 0) {
      html += '<p>' + processInline(paraLines.join(' ').trim()) + '</p>\n';
    }
  }

  return html;
}

// ─── EXTRACT H2s FROM RENDERED HTML ──────────────────────────────────────────
function extractH2s(htmlStr) {
  const results = [];
  const re = /<h2 id="([^"]+)">(.+?)<\/h2>/g;
  let m;
  while ((m = re.exec(htmlStr)) !== null) {
    // Strip inner HTML tags for display text
    const text = m[2].replace(/<[^>]+>/g, '');
    results.push({ id: m[1], text });
  }
  return results;
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let activeIndex = 0;
const renderedCache = [];

// Pre-render all sections
SECTIONS.forEach((sec, idx) => {
  renderedCache[idx] = parseMarkdown(sec.content);
});

// ─── BUILD SIDEBAR ────────────────────────────────────────────────────────────
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';

  SECTIONS.forEach((sec, idx) => {
    const h2s = extractH2s(renderedCache[idx]);
    const div = document.createElement('div');
    div.className = 'nav-section';

    const header = document.createElement('div');
    header.className = 'nav-section-header' + (idx === activeIndex ? ' active' : '');
    header.innerHTML = `<span class="nav-section-index">${(idx + 1)}.</span>${escapeForDisplay(sec.label)}`;
    header.addEventListener('click', () => {
      setActive(idx);
    });
    div.appendChild(header);

    if (h2s.length > 0) {
      const subList = document.createElement('div');
      subList.className = 'nav-subitems' + (idx === activeIndex ? ' open' : '');
      h2s.forEach(h2 => {
        const item = document.createElement('span');
        item.className = 'nav-subitem';
        item.textContent = h2.text;
        item.addEventListener('click', (e) => {
          e.stopPropagation();
          if (activeIndex !== idx) {
            setActive(idx, () => scrollToId(h2.id));
          } else {
            scrollToId(h2.id);
          }
        });
        subList.appendChild(item);
      });
      div.appendChild(subList);
    }

    sidebar.appendChild(div);
  });
}

function escapeForDisplay(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollToId(id) {
  const el = document.getElementById(id);
  if (el) {
    const wrap = document.getElementById('content-wrap');
    const elTop = el.getBoundingClientRect().top + wrap.scrollTop - 80;
    wrap.scrollTo({ top: elTop, behavior: 'smooth' });
  }
}

// ─── SET ACTIVE SECTION ───────────────────────────────────────────────────────
function setActive(idx, afterRender) {
  activeIndex = idx;

  // Update content
  const contentEl = document.getElementById('content');
  contentEl.innerHTML = renderedCache[idx];

  // Scroll content to top
  document.getElementById('content-wrap').scrollTo({ top: 0, behavior: 'instant' });

  // Update topbar
  document.getElementById('topbar-section').textContent = SECTIONS[idx].label;

  // Rebuild sidebar highlighting
  const headers = document.querySelectorAll('.nav-section-header');
  const subLists = document.querySelectorAll('.nav-subitems');
  headers.forEach((h, i) => {
    h.classList.toggle('active', i === idx);
  });
  subLists.forEach((s, i) => {
    s.classList.toggle('open', i === idx);
  });

  if (afterRender) {
    requestAnimationFrame(() => requestAnimationFrame(afterRender));
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildSidebar();
setActive(0);
</script>
</body>
</html>
