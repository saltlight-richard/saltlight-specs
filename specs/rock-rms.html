  align-items: center;

  font-weight: 600;

const SECTIONS = [{"label": "Overview", "content": "# Rock RMS Integration — Kenneth Implementation Spec\n\nThis spec covers everything you need to build the SaltLight ↔ Rock RMS integration. It's written for you specifically — a strong Python/Lambda engineer who's getting up to speed on Rock. Each feature has two parts: a plain-English section (what it does and why) and a technical API contract (what to call and what to expect back).\n\nThe integration has five features:\n\n1. **Feature 1 — Rock Account Connection** — admin pastes in their Rock domain and API key; SaltLight verifies the connection, resolves install-specific IDs, and caches campuses\n2. **Feature 1b — Rock Form Setup** — one-time account-level setup: admin selects which Rock forms SaltLight should watch and maps which field on each form holds name, email, phone, and campus. This mapping is stored once and reused by every CareFlow\n3. **Feature 2 — CareFlow Rock Configuration (Step 6)** — admin connects a mapped form to a CareFlow, sets an optional submission filter, and configures optional write-back (tags + workflows)\n4. **Feature 3 — Guest Intake: Rock → SaltLight** — scheduled Lambda polls Rock and creates SaltLight Connect Cards\n5. **Feature 4 — Card Capture Push: SaltLight → Rock** — when a card is scanned in SaltLight, it's pushed back to Rock automatically\n\nFeatures 3 and 4 read their configuration from Features 1b and 2. All five features depend on Feature 1 being connected first.\n\n**Feature 3 is ingestion only** — it creates Connect Cards and manages poll cursors. It does not write back to Rock. All Rock write-back (tags, workflows, AttributeValues) is owned by Feature 4.\n\n---\n\n## Build and Test Order\n\nBuild and test in this order — each feature depends on the previous:\n\n1. **Feature 1 — Rock Account Connection** → required before anything else. Establishes the Rock domain, API key, cached campuses, and both poll cursors.\n2. **Feature 1b — Rock Form Setup** → required before Feature 3 Track 2 works. Without `mapped_forms` in `account_metadata`, the Workflow poller has no AttributeId mapping and skips every submission.\n3. **Feature 2 — CareFlow Step 6** → required before Feature 3 filtering and Feature 4 write-back work. Without `workflow_data['rockrms']`, CareFlows have no Rock config and neither poller nor push knows what to do.\n4. **Feature 3 — Guest Intake** → can now be tested end-to-end. Track 1 (People) works after Feature 1. Track 2 (Workflows) requires Feature 1b and Feature 2.\n5. **Feature 4 — Card Capture Push** → requires Feature 1 (Rock connection) and Feature 2 (write-back config). Test after Feature 3 is working.\n\n**Important:** If you test Feature 3 Track 2 and see no cards being created, check that at least one form is mapped in `account_metadata['rockrms']['mapped_forms']` (Feature 1b) and at least one CareFlow has Step 6 configured (Feature 2). A missing mapping is a skip-and-warn, not a crash.\n\n---\n\n# Rock RMS — What you need to know\n\n**WorkflowType** is Rock's name for a form template. Your church might have one called \"First Time Guest\" or \"Connection Card\" or \"New Here\" — they named it themselves. When someone submits that form, Rock creates a new Workflow instance. The WorkflowType is the mold; the Workflow is the cast.\n\n**Workflow** is one completed form submission. If 50 people filled out the connect card on Sunday, there are 50 Workflow records. Each one holds the field answers (name, email, phone, etc.) as AttributeValues.\n\n**AttributeValue** is a single field answer inside a Workflow. Rock stores these as key-value pairs where the key is an AttributeId (an integer specific to that Rock install). So \"first name = Sarah\" is one AttributeValue record. Fetching a Workflow's data means fetching its AttributeValues and mapping them back to human-readable fields using the AttributeIds the admin configured in Step 6.\n\n**Person** is a contact record in Rock — their name, email, phone, connection status, etc. Every Person has three IDs you'll encounter: `Id` (an integer, install-specific), `Guid` (a UUID, portable across installs), and `PrimaryAliasId` (the integer used to link Workflows to a specific Person). When SaltLight writes a guest back to Rock, it creates a Person record.\n\n**DefinedValue** is Rock's version of a lookup table row. \"Visitor,\" \"Member,\" and \"Mobile\" are all DefinedValues. The human-readable label lives in Rock's UI. The integer `Id` is install-specific and can differ between churches. The `Guid` is portable — SaltLight uses the Guid to look up the correct integer Id during connection setup, then caches it.\n\n**Tag** is a label you can attach to a Person record — think of it like a flag. SaltLight uses Tags to mark guests it has processed, so a church admin can see at a glance which guests SaltLight has touched.\n\n**CampusPicker** is a Rock field type used when a form asks \"which campus?\" It stores the answer as a Campus.Id integer cast to a string — so you'll see `\"1\"` or `\"2\"`, not `\"North Campus\"`. SaltLight caches campus records on connect so it can resolve that string to a real campus name without a Rock round-trip on every record.\n\n---\n\nHow these relate:\n\n```\nWorkflowType  ──creates──►  Workflow  ──contains──►  AttributeValues\n(form template)             (one submission)          (field answers)\n                                │\n                                └──linked to──►  Person\n                                                  ├── DefinedValues (Visitor, Mobile, Active)\n                                                  ├── Tags (processed flag)\n                                                  └── Campus (via CampusPicker Id)\n```\n\nEverything below describes how SaltLight talks to Rock using these concepts. You don't need to be a Rock expert — that's what this spec is for.\n"}, {"label": "Feature 1 — Account Connection", "content": "# Feature 1 — Rock Account Connection\n\n## What it does\n\nA church admin connects their Rock instance to SaltLight by pasting in their Rock domain and a REST API key. SaltLight verifies the connection works, resolves the install-specific IDs it needs (for Visitor status, Mobile phone type, Active record status, and each campus), and starts watching Rock for new data. From that point on, new guests in Rock flow into SaltLight automatically — no manual import.\n\n## User story\n\nAs a church admin, I want to connect my Rock instance to SaltLight by entering my Rock domain and a REST API key, so that new visitors created in Rock automatically receive SMS follow-up and guests added via SMS are written back into Rock as Person records — without any manual work.\n\n## User journey\n\n**Kenneth — the admin does steps 1–5 in Rock before they ever touch SaltLight. Your job is steps 6–13 (what SaltLight does after they hit Connect).**\n\n**In Rock (admin does this first):**\n\n1. Admin logs into their Rock instance as an administrator.\n2. Goes to Admin Tools → Security → REST Keys.\n3. Creates a new REST key. They can name it whatever they want — \"SaltLight Integration\" is a reasonable suggestion, but it's their call.\n4. Assigns the key to a Rock user account that has View permission on the Person entity. (The spec's permissions section covers the exact minimum required.)\n5. Copies the API key value. That's all they do in Rock.\n\n**In SaltLight portal:**\n\n6. Admin navigates to Integrations → Rock RMS.\n7. Pastes their Rock domain (e.g. `gracechurch.rockrms.com`) and the API key into the form, then clicks Connect.\n\n**What SaltLight does behind the scenes:**\n\n8. Issues an HTTPS request against `https://{domain}/api/People/GetCurrentPerson` with the key in the `Authorization-Token` header. A connection-level failure surfaces as \"Rock unreachable\"; HTTP 401 surfaces as \"under-permissioned\"; HTTP 200 returns the Rock Person record backing the REST key.\n9. Resolves the install-local integer IDs for `Visitor` ConnectionStatus, `Active` RecordStatus, `Mobile` PhoneType, and Person RecordType — each via its portable GUID — and caches them.\n10. Calls `GET /api/Campuses?$filter=IsActive eq true&$select=Id,Guid,Name,ShortCode` and caches each active Campus.\n11. Initializes `poll_cursor_track1` (People high-water mark) and `poll_cursor_track2` (Workflow high-water mark) to `connected_at = utcnow()` — so the first poll run does not pull every historical Rock Person or Workflow.\n12. Stores `org_id = domain` so inbound Rock webhooks can be routed back to this account.\n13. Returns success. The admin sees a connected Rock card in Settings → Integrations showing the church domain and cached campus names. The next scheduled Rock poll will execute on the next 5-minute boundary.\n\n## Examples\n\n**Happy path — Grace Church, two campuses.**\n\nGrace Church runs Rock at `gracechurch.rockrms.com`. Their admin creates a REST key in Rock and pastes the domain and key into SaltLight. SaltLight reaches the domain, validates the key, resolves all four GUID-based IDs (Visitor, Mobile, Active RecordStatus, and Person RecordType), and caches two campuses (Main Campus, North Campus). Both poll cursors are set to now. Within 5 minutes, new guests start appearing in SaltLight.\n\n**Domain unreachable — typo in the domain.**\n\nAdmin mistypes `gracchurch.rockrms.com`. DNS lookup fails. SaltLight surfaces: \"Rock is not reachable at that URL. Verify the domain and that Rock is publicly accessible.\" No SaltLight account state is mutated. To fix, the admin corrects the domain and retries.\n\n**Key valid but under-permissioned — REST user missing Person View.**\n\nThe REST key authenticates (Rock recognizes it), but the backing REST user isn't in any security role with View on the `Rock.Model.Person` entity. Rock returns HTTP 401 from `GET /api/People/GetCurrentPerson`. SaltLight surfaces: \"API key is valid but the user account lacks permissions. In Rock, add the user to a security group with People read access.\"\n\n**Missing DefinedValue — non-standard Rock install.**\n\nA church's Rock install has had the standard `Visitor` ConnectionStatus DefinedValue deleted. The GUID lookup returns an empty array. SaltLight fails the connection: \"Rock instance is missing required system records. Contact SaltLight support.\" No partial state is written.\n\n## Acceptance criteria\n\n- **Reachability gate.** A connect attempt against a non-resolvable or unreachable domain results in HTTP 503 with the unreachable message, and `account_metadata.rockrms` is not written or modified.\n- **Permissions gate.** A connect attempt where `GET /api/People/GetCurrentPerson` returns HTTP 401 results in HTTP 401 to the admin with the under-permissioned message, and `account_metadata.rockrms` is not written or modified.\n- **Successful Person probe.** On HTTP 200 from `GetCurrentPerson`, the response body contains a Person object with an `Id` field — verifiable by logging into Rock at `https://{domain}/Person/{Id}` and confirming the Person record exists.\n- **Campuses cache matches Rock.** After connect, `account_metadata.rockrms.campuses` contains an array of `{id, name}` objects whose Ids and Names exactly match `GET /api/Campuses?$filter=IsActive eq true` in Rock. Length matches, order is Rock's order.\n- **GUID-resolved IDs match the install.** After connect, `account_metadata.rockrms.visitor_id`, `mobile_id`, `active_status_id`, and `person_record_type_id` are positive integers. Verify each via its GUID lookup using `_resolve_guid()` — all four call `GET /api/DefinedValues?$filter=Guid eq guid'{guid}'&$select=Id` and expect a non-empty array. If any GUID does not resolve, the connection fails with HTTP 500.\n- **`org_id` enables webhook routing.** After connect, `account_metadata.rockrms.org_id` equals `account_metadata.rockrms.domain`.\n- **No backfill on connect.** After connect, `poll_cursor_track1` and `poll_cursor_track2` both equal `connected_at` (within 1 second). The first poll run logs zero People processed and zero Workflows processed.\n- **Poller is armed.** After a successful connect, the next Rock poll executes on the next 5-minute boundary. Verifiable by confirming `account_metadata['rockrms']['last_polled']` is updated within 5 minutes of connect (it will differ from `connected_at` once the first poll runs).\n- **Idempotent reconnect.** If the admin reconnects with the same domain and a new key, the existing `rockrms` block is overwritten in full (campuses re-fetched, IDs re-resolved, cursors reset to the new `connected_at`).\n\n---\n\n## Technical API contract\n\n### Rock API calls (in order)\n\nAll calls go to `https://{domain}/api/...` with the admin's API key passed in the `Authorization-Token` header. Rock 18.1.0.0 was used for live testing against `saltlight.rockcloud.com`.\n\n**1. `GET /api/People/GetCurrentPerson` — permissions probe**\n\nPurpose: confirm the API key authenticates AND the user has People read access. This is the only call that distinguishes \"key is bad\" from \"key is fine but user has no permissions.\"\n\nResponse: a single Person object on success.\n\nBehavior:\n- HTTP 200 — key valid and user has People access. Proceed.\n- HTTP 401 — key valid but the user account lacks the security role. Surface the under-permissioned error.\n- Connection error — domain unreachable. Surface the unreachable error.\n\n**2. `GET /api/DefinedValues?$filter=Guid eq guid'{guid}'&$select=Id` — resolve portable GUIDs**\n\nPurpose: Rock's integer IDs for ConnectionStatus, PhoneType, RecordStatus, and Person RecordType are install-specific. The portable identifier is the GUID, which is the same on every Rock install. Each lookup needs to be resolved to its local integer at connect time.\n\nResponse shape: a bare JSON array of `DefinedValue` objects. With `$select=Id`, each element is `{\"Id\": <int>}`.\n\nGUIDs to resolve (all confirmed against `saltlight.rockcloud.com`):\n\n| Concept | GUID | Test env value |\n|---|---|---|\n| Visitor ConnectionStatus | `B91BA046-BC1E-400C-B85D-638C1F4E0CE2` | `66` |\n| Mobile PhoneType | `F1A30C23-EC3B-4BCD-8CBC-6928F15E7223` | `12` |\n| Active RecordStatus | `618F906C-C33D-4FA3-8AEF-E58CB7B63F1E` | `3` |\n| Person RecordType | `36CF452D-9E4A-4CB3-ADD6-52D5BE61C5CB` | (verify) |\n\n> **Verify Mobile PhoneType GUID:** The GUID above is the standard Rock install value. Confirm it resolves correctly on `saltlight.rockcloud.com` with `GET /api/DefinedValues?$filter=Guid eq guid'F1A30C23-EC3B-4BCD-8CBC-6928F15E7223'&$select=Id` before treating it as ground truth. If it returns empty, check the existing `create_connection()` implementation for the GUID currently in use.\n\nGotcha: if a GUID does not resolve (empty array), fail the connection rather than store `None` — downstream code will assume these IDs are present.\n\n**3. `GET /api/Campuses?$filter=IsActive eq true&$select=Id,Guid,Name,ShortCode` — cache campuses**\n\nPurpose: cache the church's active campuses so per-record campus matching does not have to hit Rock every poll.\n\nResponse shape: **a bare JSON array** — not the OData `{\"value\":[...]}` envelope. Pass the result through the codebase's `_to_list` helper to handle both shapes safely.\n\nEach campus object contains: `Id`, `Guid`, `Name`, `ShortCode`. Extract and store `{id, name}` per campus.\n\nConfirmed in test env: two campuses returned — `{Id:1, Name:\"Main Campus\"}` and `{Id:2, Name:\"North Campus\"}`.\n\n### What gets stored in SaltLight\n\nAll connection state lives in `public.account.account_metadata['rockrms']`. No new tables. The full shape after a successful connect:\n\n```json\n{\n  \"connected\": true,\n  \"church_name\": \"gracechurch.rockrms.com\",\n  \"connected_at\": \"2026-05-26T22:00:00Z\",\n  \"settings\": {\"create_enabled\": false},\n\n  \"domain\": \"gracechurch.rockrms.com\",\n  \"org_id\": \"gracechurch.rockrms.com\",\n\n  \"visitor_id\": 66,\n  \"mobile_id\": 12,\n  \"active_status_id\": 3,\n  \"person_record_type_id\": 1,\n\n  \"campuses\": [\n    {\"id\": 1, \"name\": \"Main Campus\"},\n    {\"id\": 2, \"name\": \"North Campus\"}\n  ],\n\n  \"poll_cursor_track1\": \"2026-05-26T22:00:00Z\",\n  \"poll_cursor_track2\": \"2026-05-26T22:00:00Z\",\n  \"last_polled\": \"2026-05-26T22:00:00Z\",\n\n  \"poll_schedule\": {\n    \"high_frequency_days\": [5, 6],\n    \"high_frequency_start\": \"15:00\",\n    \"high_frequency_end\": \"21:00\",\n    \"low_frequency_interval_hours\": 12,\n    \"timezone\": \"America/Chicago\"\n  }\n}\n```\n\nField-by-field purpose:\n\n| Field | Used for |\n|---|---|\n| `connected`, `connected_at`, `church_name`, `settings` | Existing connection record (already written by `set_connection`). |\n| `domain` | Base URL for every Rock API call. |\n| `org_id` | Inbound webhook routing — must equal `domain`. |\n| `visitor_id` | `ConnectionStatusValueId` when creating People in Rock (write-back). |\n| `mobile_id` | `NumberTypeValueId` for identifying and writing the mobile entry in `PhoneNumbers`. |\n| `active_status_id` | `RecordStatusValueId` when creating People in Rock (write-back). |\n| `person_record_type_id` | `RecordTypeValueId` when creating People in Rock (write-back). Needed by Feature 4's `POST /api/People`. Value requires verification against `saltlight.rockcloud.com`. |\n| `campuses` | In-memory campus list for per-record matching during poll and write-back. |\n| `poll_cursor_track1` | High-water mark for the People poll (Track 1). Initialized to `connected_at` so no backfill. |\n| `poll_cursor_track2` | High-water mark for the Workflow poll (Track 2). Initialized to `connected_at` so no backfill. |\n| `last_polled` | Last successful poll run timestamp. |\n| `poll_schedule` | Per-church poll cadence. |\n\n### Rock API gotchas specific to this feature\n\n- **`/api/Campuses` returns a bare array, not `{\"value\":[...]}`.** Always run it through `_to_list` rather than indexing `result['value']`.\n- **Two different 401 meanings.** HTTP 401 from `/api/People/GetCurrentPerson` does NOT mean the key is invalid — it usually means the key authenticated but the user has no security role. The error message shown to the admin must reflect this distinction.\n- **GUIDs are the only portable identifiers.** `visitor_id=66`, `mobile_id=12`, `active_status_id=3`, and `person_record_type_id=1` are accurate for the test env only. Never hard-code these — always resolve via GUID at connect time and cache the resulting integer.\n- **`$filter` GUID syntax.** Rock's OData filter requires the literal prefix `guid'...'` — e.g. `$filter=Guid eq guid'618F906C-C33D-4FA3-8AEF-E58CB7B63F1E'`. The prefix is not optional.\n- **No backfill on first connect.** Both poll cursors must be initialized to `connected_at` (or `utcnow()`). If they default to epoch or `None`, the first poll will try to pull every Person and every Workflow in the church's Rock history.\n\n---\n\n## Reference implementation (optional)\n\n> Kenneth — this is one way to implement the above. If you prefer to write your own code, skip this section entirely.\n\n**Where it goes.** Extend the existing `create_connection()` method in `tf/lambda_functions/shared/integrations/rockrms.py`, called from `handle_rockrms_connect()` in `tf/lambda_functions/orchestrator/src/rockrms.py`. The existing connectivity probe and `visitor_id`/`mobile_id` resolution stay; the new work (permissions probe, active status, campuses, cursors, `org_id`) runs before the final `set_connection()` call.\n\n**Reading the existing connection elsewhere.** The base integration class does NOT have a `get_account_metadata()` method. Use `self.get_connection()` — it returns the `rockrms` sub-dict from `account_metadata`, or `None` if no connection exists.\n\n**About `self.api_request(method, path)`:** Takes the HTTP method (`'GET'`, `'POST'`, `'PATCH'`) and a Rock API path (e.g. `/api/DefinedValues?$filter=...`). The domain and `Authorization-Token` header are injected automatically from the stored connection. Returns the parsed JSON body. Raises `AuthenticationHttpError` on HTTP 401 and `RequestConnectionError` on network failure. Other HTTP errors raise their own exception types — wrap calls that can fail for non-401 reasons with a broad `except Exception`.\n\n**About `set_connection()`:** Call as `set_connection(connected=True, church_name=domain, other={...})`. The `other` dict is merged into the stored `rockrms` block alongside `connected`, `connected_at`, `church_name`, and `settings`. Every key in `other` is written; missing keys are not cleared. Pass all new fields (domain, org_id, visitor_id, mobile_id, active_status_id, person_record_type_id, campuses, cursors, last_polled, poll_schedule) in a single `other={}` call. Verify the exact signature in `tf/lambda_functions/shared/integrations/base.py` before use.\n\n```python\nset_connection(\n    connected=True,\n    church_name=domain,  # or church name if available\n    other={\n        'domain':                domain,\n        'org_id':                domain,\n        'visitor_id':            visitor_id,\n        'mobile_id':             mobile_id,\n        'active_status_id':      active_status_id,\n        'person_record_type_id': person_record_type_id,\n        'campuses':              campuses,\n        'poll_cursor_track1':    now,\n        'poll_cursor_track2':    now,\n        'last_polled':           now,\n        'poll_schedule': {\n            'high_frequency_days':        [5, 6],\n            'high_frequency_start':       '15:00',\n            'high_frequency_end':         '21:00',\n            'low_frequency_interval_hours': 12,\n            'timezone':                   'America/Chicago',\n        },\n    }\n)\n# Note: set_connection() signature uses connected=True and church_name= as top-level kwargs.\n# Verify the exact signature in tf/lambda_functions/shared/integrations/base.py before use.\n# 'now' is computed once above as datetime.utcnow().isoformat() + 'Z'\n# All poll_schedule times are stored as UTC strings in v1 (timezone field is stored but unused).\n```\n\n**Helper to add to the `RockRMS` class:**\n\n```python\ndef _resolve_guid(self, guid: str) -> int:\n    \"\"\"Resolve a portable Rock DefinedValue GUID to this install's integer ID.\n    Raises ValueError if the GUID is not present — connect should fail fast.\"\"\"\n    url = f\"/api/DefinedValues?$filter=Guid eq guid'{guid}'&$select=Id\"\n    values = self._to_list(self.api_request('GET', url))\n    if not values:\n        raise ValueError(f\"Rock DefinedValue GUID not found: {guid}\")\n    return values[0]['Id']\n```\n\n**Endpoints to register on `self.endpoint_info`:**\n\n```python\n'current_person': {'url': '/api/People/GetCurrentPerson'},\n'campuses':       {'url': '/api/Campuses?$filter=IsActive eq true&$select=Id,Guid,Name,ShortCode'},\n```\n\n**Logical flow inside `create_connection()` (after existing probes):**\n\n1. Call the permissions probe — `GET /api/People/GetCurrentPerson`. On `AuthenticationHttpError`, re-raise so the handler can map it to the under-permissioned 401 message.\n2. Resolve `mobile_id` via `self._resolve_guid('F1A30C23-EC3B-4BCD-8CBC-6928F15E7223')` — only if the existing `create_connection()` code does not already resolve it. Check before adding.\n3. Resolve `active_status_id` via `self._resolve_guid('618F906C-C33D-4FA3-8AEF-E58CB7B63F1E')`.\n4. Resolve `person_record_type_id` via `self._resolve_guid('36CF452D-9E4A-4CB3-ADD6-52D5BE61C5CB')`. This is the \"Person\" RecordType used by `POST /api/People` in Feature 4. Verify the GUID resolves on `saltlight.rockcloud.com` before treating it as final.\n5. Fetch campuses via `self.api_request('GET', self.endpoint_info['campuses']['url'])`, pass through `self._to_list(...)`, and project to `[{'id': c['Id'], 'name': c['Name']} for c in campuses_raw]`.\n6. Compute `now = datetime.utcnow().isoformat() + 'Z'`.\n7. Call `set_connection()` with the full `other={}` payload (domain, `org_id`, visitor/mobile/active/person-record-type IDs, campuses, both cursors, `last_polled`, default `poll_schedule`).\n\n**Error mapping in `handle_rockrms_connect()`:**\n\n| Exception | HTTP | Body |\n|---|---|---|\n| `AuthenticationHttpError` (from permissions probe) | 401 | `{\"error\": \"API key is valid but the user account lacks permissions. In Rock, add the user to a security group with People read access.\"}` |\n| `RequestConnectionError` (domain unreachable) | 503 | `{\"error\": \"Rock is not reachable at that URL. Verify the domain and that Rock is publicly accessible.\"}` |\n| `ValueError` (GUID didn't resolve) | 500 | `{\"error\": \"Rock instance is missing required system records. Contact SaltLight support.\"}` |\n\n**Note on POST responses.** Not used in Feature 1, but worth knowing for adjacent work: `POST /api/People` returns a **bare integer** (the new Person Id), same shape as `POST /api/Workflows`. Do NOT call `.get('Id')` on these responses — `int` has no `.get`.\n"}, {"label": "Feature 1b — Form Setup", "content": "# Feature 1b — Rock Form Setup\n\n## What it does\n\nRight after a church connects Rock (Feature 1), SaltLight walks the admin through a one-time form setup: which Rock forms should SaltLight watch, and which field on each form holds the guest's name, email, phone, and campus?\n\nSaltLight loads the church's active Rock forms, the admin picks the ones they want to use, and SaltLight auto-suggests field matches by comparing Rock field names to SaltLight's five core fields. The admin corrects anything wrong, confirms, and saves. That mapping lives at the account level — every CareFlow reuses it. If the church adds a new form later, they come back to Integrations and add it there.\n\n## User story\n\nAs a church admin who has just connected Rock, I want to tell SaltLight which of my existing Rock forms to watch and which fields on each form hold guest information, so that I only have to do this mapping once — not every time I build a new CareFlow.\n\n## User journey\n\n1. Admin completes the Rock connection (Feature 1). The portal transitions directly to the Form Setup step.\n\n2. SaltLight calls `GET /api/WorkflowTypes?$filter=IsActive eq true` and displays the church's active Rock forms as a checklist (name + Id). Admin selects every form they want SaltLight to use. Most churches have one — some have two or three (e.g. \"First Time Guest\" and \"New Members Class\").\n\n3. Admin clicks Next. For each selected form, SaltLight loads the form's Attributes from Rock.\n\n4. SaltLight runs auto-suggest: for each of the five SaltLight fields (First Name, Last Name, Email, Phone, Campus), it scores every Rock attribute name and pre-selects the best match. See auto-suggest logic below.\n\n5. The admin sees a mapping screen per form — five rows, each pre-filled with the best guess. Confident matches show a small \"auto-matched\" indicator. Blank rows (no confident match) are highlighted so the admin knows to fill them in.\n\n6. Admin corrects any wrong matches, fills in any blanks, and clicks Save.\n\n7. The mapping is stored at the account level. The admin sees a summary: \"3 forms configured — First Time Guest, New Members Class, Youth Interest Form.\"\n\n8. Later, if the church adds a new Rock form: admin goes to Settings → Integrations → Rock → Manage Forms → Add Form. Same flow for the new form only.\n\n## Auto-suggest logic\n\nSaltLight normalizes both sides (lowercase, strip punctuation and extra spaces) and looks for keyword matches. No Rock API call needed — this is pure SaltLight string matching on field names returned from `/api/Attributes`.\n\n| SaltLight field | Keywords that trigger a confident match |\n|---|---|\n| First Name | \"first\", \"fname\", \"given\", \"forename\" |\n| Last Name | \"last\", \"lname\", \"surname\", \"family\" |\n| Email | \"email\", \"mail\" |\n| Phone | \"phone\", \"mobile\", \"cell\", \"contact number\" |\n| Campus | \"campus\", \"location\", \"site\", \"congregation\" |\n\n**Confidence tiers:**\n- **High (auto-fill, show \"auto-matched\" badge):** normalized field name contains one of the above keywords AND no other field on the form scored equally for the same SaltLight slot\n- **Ambiguous (auto-fill, show warning):** two Rock fields scored equally for the same SaltLight slot — pre-fill the first alphabetically but flag it for review\n- **No match (leave blank, highlight):** no Rock field name contains any keyword for that SaltLight slot — admin must fill in manually\n\nThe auto-suggest is a convenience, not a guarantee. The admin always has the final word. Saving with any of the five core fields blank is blocked with a validation error naming the missing field.\n\n## Examples\n\n**Grace Church — single form, confident auto-match.**\n\nGrace's \"First Time Guest\" form has attributes: \"First Name\" (Id 8281), \"Last Name\" (Id 8282), \"Email Address\" (Id 8283), \"Cell Phone\" (Id 8284), \"Home Campus\" (Id 8285), \"Interest Area\" (Id 8286).\n\nAuto-suggest results:\n- First Name → \"First Name\" (Id 8281) — high confidence (\"first\")\n- Last Name → \"Last Name\" (Id 8282) — high confidence (\"last\")\n- Email → \"Email Address\" (Id 8283) — high confidence (\"email\")\n- Phone → \"Cell Phone\" (Id 8284) — high confidence (\"cell\")\n- Campus → \"Home Campus\" (Id 8285) — high confidence (\"campus\")\n\nAdmin sees all five pre-filled. No corrections needed. One click to save.\n\n**Calvary Chapel — custom field names, partial auto-match.**\n\nCalvary's form has: \"Guest Given Name\" (Id 1041), \"Guest Surname\" (Id 1042), \"Contact Email\" (Id 1043), \"Best Number\" (Id 1044), \"Which Campus?\" (Id 1045).\n\nAuto-suggest results:\n- First Name → \"Guest Given Name\" (Id 1041) — high confidence (\"given\")\n- Last Name → \"Guest Surname\" (Id 1042) — high confidence (\"surname\")\n- Email → \"Contact Email\" (Id 1043) — high confidence (\"email\")\n- Phone → blank — \"Best Number\" contains no keyword. Admin fills in manually.\n- Campus → \"Which Campus?\" (Id 1045) — high confidence (\"campus\")\n\nAdmin sees four pre-filled, one blank highlighted. They select \"Best Number\" for Phone and save.\n\n## Acceptance criteria\n\n- After Feature 1 completes, the admin is immediately prompted to set up forms. Form setup is required before the admin can access other portal features. (A \"skip for now\" flow is not defined in v1 — if product decides to add it later, it will need an explicit spec.)\n- The form checklist shows all active Rock WorkflowTypes. Inactive types are not shown.\n- Admin can select one or more forms. Selecting zero and clicking Next is blocked: at least one form must be selected before proceeding.\n- For each selected form, auto-suggest pre-fills the mapping using the keyword logic above. High-confidence matches are visually distinguished from ambiguous ones.\n- Saving with any of the five core fields blank is blocked. The validation error names the missing field (e.g. `{\"error\": \"phone mapping is required for 'First Time Guest'\"}`). This validation is server-side, enforced by the `POST /integrations/rockrms/forms/mapping` endpoint.\n- After saving, `account_metadata['rockrms']['mapped_forms']` contains one entry per mapped form with the correct `workflow_type_id`, `workflow_type_name`, and `attribute_ids` object.\n- The mapping can be verified end-to-end: submit a test form submission in Rock, wait for Feature 3's poller, and confirm the resulting SaltLight Connect Card contains correct first name, last name, email, phone, and campus.\n- \"Manage Forms\" in Integrations → Rock allows adding a new form (same flow), removing a form (with warning if any CareFlows reference it), or re-mapping fields on an existing form.\n- Removing a mapped form that is referenced by one or more CareFlows is enforced server-side: the `DELETE /integrations/rockrms/forms/{workflowTypeId}` endpoint returns HTTP 409 with a list of CareFlow names if any active CareFlows reference it. A `?force=true` query param bypasses the check. The portal shows the 409 response as a confirmation dialog.\n\n---\n\n## Technical API contract\n\n### Rock API calls\n\n**1. List active WorkflowTypes** — same call as Feature 2's form dropdown, already validated.\n\n- `GET /api/WorkflowTypes?$filter=IsActive eq true&$select=Id,Name&$orderby=Name asc`\n- Returns bare array. Run through `_to_list()`.\n- Key fields: `Id`, `Name`. Display both to admin.\n\n**2. Load attributes for each selected form** — same call as current Feature 2 field-mapping, already validated.\n\n- `GET /api/Attributes?$filter=EntityTypeId eq 113 and EntityTypeQualifierColumn eq 'WorkflowTypeId' and EntityTypeQualifierValue eq '{workflowTypeId}'&$select=Id,Key,Name,FieldTypeId`\n- Returns bare array.\n- Run auto-suggest against the `Name` field of each returned attribute.\n\n### What gets stored in SaltLight\n\nStored in `account_metadata['rockrms']['mapped_forms']` — a JSON array, one entry per mapped form:\n\n```json\n{\n  \"mapped_forms\": [\n    {\n      \"workflow_type_id\": 24,\n      \"workflow_type_name\": \"First Time Guest\",\n      \"attribute_ids\": {\n        \"first_name\": 8281,\n        \"last_name\": 8282,\n        \"email\": 8283,\n        \"phone\": 8284,\n        \"campus\": 8285\n      }\n    }\n  ]\n}\n```\n\nFeatures 3 and 4 look up the `attribute_ids` for a given `workflow_type_id` from this array. They no longer read `attribute_ids` from the CareFlow's `workflow_data['rockrms']`.\n\n### SaltLight backend endpoints for Feature 1b\n\nKenneth — these are the SaltLight-side endpoints you need to build. Follow the existing handler pattern in `tf/lambda_functions/orchestrator/src/rockrms.py`.\n\n**1. `GET /integrations/rockrms/forms` — load available Rock forms**\n\nCalled by the portal to populate the form-selection checklist. Proxies `GET /api/WorkflowTypes?$filter=IsActive eq true&$select=Id,Name&$orderby=Name asc` from Rock and returns the bare array to the portal. Requires an active Rock connection (`self.get_connection()` must return non-None).\n\n**2. `GET /integrations/rockrms/forms/{workflowTypeId}/attributes` — load attributes for a form**\n\nCalled by the portal when the admin selects forms and clicks Next. Proxies `GET /api/Attributes?$filter=EntityTypeId eq 113 and EntityTypeQualifierColumn eq 'WorkflowTypeId' and EntityTypeQualifierValue eq '{workflowTypeId}'&$select=Id,Key,Name,FieldTypeId` and runs auto-suggest server-side. Returns:\n\n```json\n{\n  \"attributes\": [{\"Id\": 8281, \"Name\": \"First Name\", \"Key\": \"FirstName\", \"FieldTypeId\": 1}, ...],\n  \"suggestions\": {\n    \"first_name\": {\"attribute_id\": 8281, \"confidence\": \"high\"},\n    \"last_name\":  {\"attribute_id\": 8282, \"confidence\": \"high\"},\n    \"email\":      {\"attribute_id\": 8283, \"confidence\": \"high\"},\n    \"phone\":      {\"attribute_id\": 8284, \"confidence\": \"high\"},\n    \"campus\":     {\"attribute_id\": 8285, \"confidence\": \"high\"}\n  }\n}\n```\n\nThe `suggestions` object is the output of `auto_suggest(attributes)`. `confidence` is one of `\"high\"`, `\"ambiguous\"`, or `\"none\"`. A `\"none\"` suggestion means `attribute_id` is `null` and the portal must leave that slot blank for the admin to fill in.\n\n**3. `POST /integrations/rockrms/forms/mapping` — save the completed mapping**\n\nCalled by the portal when the admin clicks Save. Request body:\n\n```json\n{\n  \"mappings\": [\n    {\n      \"workflow_type_id\": 24,\n      \"workflow_type_name\": \"First Time Guest\",\n      \"attribute_ids\": {\n        \"first_name\": 8281,\n        \"last_name\": 8282,\n        \"email\": 8283,\n        \"phone\": 8284,\n        \"campus\": 8285\n      }\n    }\n  ]\n}\n```\n\nValidates that all 5 `attribute_ids` fields are non-null integers. Rejects with HTTP 400 and a field-level error if any are missing (e.g. `{\"error\": \"phone mapping is required for 'First Time Guest'\"}`). On success, writes `mappings` array to `account_metadata['rockrms']['mapped_forms']` using `jsonb_set`. Returns HTTP 200.\n\n```sql\n-- Full-replace mapped_forms array (replaces any existing mapping for all affected forms):\nUPDATE public.account\nSET account_metadata = jsonb_set(\n    account_metadata,\n    ARRAY['rockrms', 'mapped_forms']::text[],\n    %s::jsonb\n)\nWHERE account_id = %s\n-- Params: (json.dumps(mappings_list), account_id)\n-- mappings_list is the validated 'mappings' array from the request body.\n-- This full-replace strategy is safe because the portal sends the complete\n-- configured set. Individual form merges are not needed in v1.\n```\n\n**4. `DELETE /integrations/rockrms/forms/{workflowTypeId}` — remove a mapped form**\n\nChecks whether any active CareFlow references this `workflow_type_id` in `workflow_data['rockrms']`. Query:\n\n```sql\nSELECT w.workflow_id, w.workflow_name\nFROM public.workflow w\nWHERE w.account_id = %s\n  AND w.workflow_active = true  -- verify: confirm this column is named workflow_active (not workflow_present)\n  AND w.workflow_data->'rockrms' @> %s::jsonb\n-- Params: (account_id, json.dumps([{\"workflow_type_id\": workflow_type_id}]))\n-- The second param is a JSON string built in Python, e.g.:\n--   import json\n--   json_filter = json.dumps([{\"workflow_type_id\": workflow_type_id}])\n-- This checks that workflow_data['rockrms'] contains an element with the given workflow_type_id.\n```\n\nIf any CareFlows reference it: return HTTP 409 with `{\"error\": \"...\", \"careflows\": [{\"id\": ..., \"name\": ...}]}` listing the CareFlows by name. The portal shows this list as the warning. Admin must explicitly confirm removal — the portal calls DELETE again with `?force=true` to bypass the check and proceed. On success, removes the entry from `mapped_forms` and returns HTTP 200.\n\n```sql\n-- Remove a single form entry from mapped_forms by workflow_type_id:\nUPDATE public.account\nSET account_metadata = jsonb_set(\n    account_metadata,\n    ARRAY['rockrms', 'mapped_forms']::text[],\n    (\n        SELECT COALESCE(jsonb_agg(el), '[]'::jsonb)\n        FROM jsonb_array_elements(\n            account_metadata->'rockrms'->'mapped_forms'\n        ) el\n        WHERE (el->>'workflow_type_id')::int != %s\n    )\n)\nWHERE account_id = %s\n-- Params: (workflow_type_id, account_id)\n```\n\n### Auto-suggest implementation note\n\n```python\nFIELD_KEYWORDS = {\n    'first_name': ['first', 'fname', 'given', 'forename'],\n    'last_name':  ['last', 'lname', 'surname', 'family'],\n    'email':      ['email', 'mail'],\n    'phone':      ['phone', 'mobile', 'cell', 'contact number'],\n    'campus':     ['campus', 'location', 'site', 'congregation'],\n}\n\ndef auto_suggest(attributes: list) -> dict:\n    \"\"\"Returns {saltlight_field: {attribute_id, confidence}} for each of the 5 fields.\n    confidence: 'high' | 'ambiguous' | 'none'\"\"\"\n    ...\n```\n\nRun server-side when the admin finishes selecting forms. Return suggestions alongside the attribute list so the portal can pre-populate the dropdowns.\n"}, {"label": "Feature 2 — CareFlow Step 6", "content": "# Feature 2 — CareFlow Rock Configuration (Step 6)\n\n## What it does\n\nStep 6 is where a church admin connects a SaltLight CareFlow to a Rock form.\n\nThe hard part — which Rock fields hold the guest's name, email, phone, and campus — was already done in Feature 1b when the admin mapped their forms. Step 6 is just three questions:\n\n1. **Which mapped form triggers this CareFlow?** (dropdown of already-mapped forms)\n2. **Should we filter which submissions come in?** (optional — e.g. only pull in submissions where \"Interest Area\" = \"Sunday Service\")\n3. **When SaltLight captures a guest in this CareFlow, what should we write back to Rock?** (optional — tags to apply, workflows to launch)\n\nThat's it. No field mapping here.\n\n## User story\n\nAs a church admin, I want to connect my SaltLight CareFlow to a specific Rock form and optionally filter which submissions come in and which Rock tags and workflows fire when a guest is captured — so that Rock and SaltLight stay in sync without me doing anything manually.\n\n## User journey\n\n1. Admin opens an existing CareFlow (or creates one) and navigates to Step 6 — \"Rock Integration.\"\n\n2. The screen has three sections: **Form**, **Filter** (optional), and **Write-back** (optional).\n\n3. **Form — pick which Rock form triggers this CareFlow.** Dropdown shows only the forms the admin already mapped in Feature 1b (e.g. \"First Time Guest,\" \"New Members Class\"). Selecting a form is the only required action in Step 6. Leaving it blank means no Rock integration for this CareFlow.\n\n4. **Filter — narrow which submissions come in (optional).** Admin picks one attribute from the selected form as a filter field (e.g. \"Interest Area\"), then selects which values should trigger this CareFlow (e.g. \"Sunday Service,\" \"Youth Ministry\"). SaltLight loads the allowed values from Rock — handling both DefinedValue picker fields and Value List fields. If no filter is set, every completed submission of this form flows into the CareFlow.\n\n5. **Write-back — what to do when SaltLight captures a guest (optional).** Two independent multi-selects:\n   - **Tags:** select one or more Rock person Tags (queried live from Rock — `GET /api/Tags?$filter=EntityTypeId eq 15&$select=Id,Name&$orderby=Name asc`). All selected tags are applied to the matched Rock Person when a card is captured in this CareFlow.\n   - **Workflows:** select one or more Rock WorkflowTypes to launch (queried live from Rock). A new workflow instance is created for each selected type when a card is captured.\n\n6. Admin clicks Save.\n\n## Examples\n\n**Example 1 — Grace Church, filtered inbound + write-back.**\n\nAdmin opens \"Sunday Morning First-Timers\" CareFlow and goes to Step 6. They pick \"First Time Guest\" from the form dropdown. They set the filter to \"Interest Area\" = \"Sunday Service\" or \"Youth Ministry.\" For write-back, they select Tags: \"New Visitor\" + \"Sunday Attendee\" (two tags), and Workflows: \"First Time Guest Follow-up\" (one workflow). Save.\n\nResult: only \"First Time Guest\" submissions where Interest Area is Sunday Service or Youth Ministry land in this CareFlow. Every card captured in this CareFlow tags the Rock person with two tags and launches one follow-up workflow.\n\n**Example 2 — Calvary Chapel, no filter, single write-back.**\n\nAdmin picks \"First Time Guest,\" no filter (every submission comes in), one tag (\"New Visitor\"), no workflow. Save.\n\n**Example 3 — New Life Church, no Rock integration.**\n\nAdmin leaves Step 6 blank. No Rock data flows in or out for this CareFlow.\n\n**Example 4 — Youth Ministry CareFlow, different write-back than Sunday Morning.**\n\nSame church, same \"First Time Guest\" form as Example 1 — but this CareFlow filters for \"Youth Ministry\" only and has different write-back: Tags: \"Youth Interest,\" Workflows: \"Youth Follow-up Workflow.\" Different tags and workflows per CareFlow, same underlying form mapping.\n\n## Acceptance criteria\n\n- The form dropdown shows only forms the admin has already mapped in Feature 1b — not all Rock WorkflowTypes.\n- Selecting a form is the only required field. Leaving Step 6 entirely blank is valid — no Rock integration for this CareFlow.\n- The filter attribute dropdown shows the attributes defined on the selected form. Selecting a filter attribute loads its allowed values from Rock (DefinedValue picker and Value List both handled).\n- The Tags multi-select is populated by `GET /api/Tags?$filter=EntityTypeId eq 15&$select=Id,Name&$orderby=Name asc`. Admin can select one or more tags, or none.\n- The Workflows multi-select is populated via `GET /integrations/rockrms/workflow-types` (which proxies `GET /api/WorkflowTypes?$filter=IsActive eq true&$select=Id,Name&$orderby=Name asc` to Rock). Admin can select one or more, or none.\n- Tags and Workflows are independent — admin can configure tags without workflows, or workflows without tags, or both, or neither.\n- After Save, `workflow_data['rockrms']` reflects exactly what was configured (see data shape below).\n- A CareFlow with no Rock config (`workflow_data['rockrms']` absent or `[]`) works normally — the poller skips it, Feature 4 makes no Rock calls.\n- No write calls are made to Rock during Step 6. All Rock calls are read-only (loading dropdowns). Write-back (tag application, workflow creation, AttributeValue writes) fires in Feature 4 at card capture time — not here.\n\n---\n\n## Technical API contract\n\n### Rock API calls used to populate the UI\n\n**1. Form dropdown** — pre-populated from `account_metadata['rockrms']['mapped_forms']` (no Rock API call needed at this point).\n\n**2. Filter attribute dropdown** — re-fetch attributes for the selected form when admin picks one.\n\n- `GET /api/Attributes?$filter=EntityTypeId eq 113 and EntityTypeQualifierColumn eq 'WorkflowTypeId' and EntityTypeQualifierValue eq '{workflowTypeId}'&$select=Id,Key,Name,FieldTypeId`\n- Returns bare array. Run through `_to_list()`. This is the same Rock endpoint used in Feature 1b's attribute loading step.\n\n**3. Filter allowed values** — only needed when admin picks a filter attribute.\n\n- DefinedValue picker (FieldTypeIds 5 and 16 only): read `definedtypeguid` qualifier → resolve to DefinedTypeId → list `/api/DefinedValues?$filter=DefinedTypeId eq {id}&$select=Id,Value&$orderby=Order asc`. Returns `[{Id, Value}, ...]` — use `Id` as the stored `id` and `Value` as the displayed `label`.\n- Value List (FieldTypeId 6): parse pipe-delimited `values` qualifier string.\n- Campus picker (FieldTypeId 53): NOT a DefinedValue type — it does not use a `definedtypeguid` qualifier. Return the list from `rock_meta['campuses']` (cached at connect time) as `[{id: campus['id'], label: campus['name']}]`. Do not hit the Rock API for this — the campuses are already cached.\n- Returns `[{id, label}, ...]`.\n\n**4. Tags multi-select**\n\n- `GET /api/Tags?$filter=EntityTypeId eq 15&$select=Id,Name&$orderby=Name asc`\n- Returns bare array.\n\n**5. Workflows multi-select**\n\n- SaltLight endpoint: `GET /integrations/rockrms/workflow-types` (or verify the existing route name in `tf/lambda_functions/orchestrator/src/rockrms.py`)\n- Rock API proxied: `GET /api/WorkflowTypes?$filter=IsActive eq true&$select=Id,Name&$orderby=Name asc`\n- Returns bare array of `{Id, Name}` objects. **Do NOT reuse the form dropdown result** — the form dropdown shows only *mapped* forms, but the write-back Workflows dropdown must show ALL active WorkflowTypes (the admin may want to launch a workflow that is not one of the mapped intake forms).\n- If no route exists yet for this endpoint, add one following the `handle_rockrms_forms` pattern.\n\n### What gets stored in SaltLight\n\nOn Save, `public.workflow.workflow_data['rockrms']` holds an array of length 0 or 1:\n\n```json\n[{\n  \"workflow_type_id\": 24,\n  \"trigger_attribute_id\": 8286,\n  \"trigger_values\": [\"Sunday Service\", \"Youth Ministry\"],\n  \"writeback_tag_ids\": [42, 87],\n  \"writeback_workflow_type_ids\": [24, 31]\n}]\n```\n\n**What changed from the previous spec:**\n- `attribute_ids` is gone — field mapping now lives at the account level in `account_metadata['rockrms']['mapped_forms']`.\n- `writeback_tag_ids` replaces `writeback_tag_id` — now an array (multi-select).\n- `writeback_workflow_type_ids` replaces `writeback_workflow_type_id` — now an array (multi-select).\n\n> **⚠️ Migration note for Kenneth:** The field names `writeback_tag_ids` and `writeback_workflow_type_ids` are NEW. Any existing code in Feature 3, Feature 4, or the database schema that reads `writeback_tag_id` (singular) or `writeback_workflow_type_id` (singular) must be updated to read the new plural array fields. These are breaking field name changes — the old singular keys no longer exist in `workflow_data['rockrms']` after Feature 2 ships.\n\nField-by-field:\n\n| Field | Type | Required | Purpose |\n|---|---|---|---|\n| `workflow_type_id` | int | yes (when entry present) | Which Rock form this CareFlow listens to. Key for looking up `attribute_ids` in `mapped_forms`. |\n| `trigger_attribute_id` | int \\| null | optional | The Rock attribute used to filter which submissions come in. |\n| `trigger_values` | string[] | optional | Allowed values for `trigger_attribute_id`. Empty array = no filter (all submissions in). |\n| `writeback_tag_ids` | int[] | optional | Rock Tag Ids to apply on card capture. Empty array = no tags. |\n| `writeback_workflow_type_ids` | int[] | optional | Rock WorkflowType Ids to instantiate on card capture. Empty array = no workflows. |\n\n### How Features 3 and 4 read the new shape\n\n**Feature 3 (inbound poller)** — to get `attribute_ids` for a given `workflow_type_id`:\n\n```python\n# Note: in Feature 3's context, rock_meta IS account_metadata['rockrms'] (the sub-dict\n# returned by the account selection query), so .get('mapped_forms', []) is correct.\nmapped_forms = rock_meta.get('mapped_forms', [])  # same as account_metadata['rockrms']['mapped_forms']\nform_map = {f['workflow_type_id']: f['attribute_ids'] for f in mapped_forms}\nattr_ids = form_map.get(cfg['workflow_type_id'])\n```\n\n**Feature 4 (card capture push)** — write-back now loops:\n\n```python\n# Apply all configured tags\nfor tag_id in cfg.get('writeback_tag_ids', []):\n    post_tagged_item(tag_id, person_guid)\n\n# Launch all configured workflows\nfor wf_type_id in cfg.get('writeback_workflow_type_ids', []):\n    wf_id = post_workflow(wf_type_id, primary_alias_id)\n    set_workflow_attribute_values(wf_id, attr_ids, card_data)\n```\n\nFeatures 3 and 4 must be updated to use this lookup pattern and loop over arrays instead of reading single IDs. All other logic (dedup, cursor management, tag application, AttributeValue writes) is unchanged.\n"}, {"label": "Feature 3 — Guest Intake", "content": "# Feature 3 — Guest Intake: Rock → SaltLight\n\n## What it does\n\nA scheduled Lambda polls Rock and turns new guest data into SaltLight Connect Cards automatically. It watches two data sources:\n\n**Track 1 — Rock Person records.** When a volunteer or staff member adds a new Person directly in Rock (from a check-in kiosk or data entry screen), that person should appear in SaltLight too. The poller fetches recently created or modified Person records from Rock and creates a Connect Card for each new person it hasn't seen before.\n\n**Track 2 — Rock Workflow form submissions.** When a guest fills out a church's existing connect card form in Rock (their WorkflowType — e.g. \"First Time Guest,\" Id=24), that completed submission becomes a SaltLight Connect Card. The poller fetches completed Workflow instances for each WorkflowType configured in Step 6, reads the guest's field values using the AttributeId mapping set up in Feature 1b (stored at the account level — not per-CareFlow), and creates a Connect Card.\n\nBoth tracks run on every poll tick. Each Connect Card gets one `interaction` row per active CareFlow with a matching Rock config. The poll runs at high frequency on service days, low frequency on weekdays — so follow-up starts within minutes of a guest appearing in Rock. The care team never re-keys data that Rock already captured.\n\n## User story\n\nAs a church running Rock RMS, I want every new Rock Person record (especially visitors) and every completed submission of my existing connect card form to appear in SaltLight as a Connect Card automatically, so my care team can start the follow-up SMS conversation without manually transferring the data.\n\n## User journey\n\n**Track 1 — Rock Person record**\n\n1. A volunteer opens Rock's data entry screen (or a check-in kiosk creates the record) and adds a new Person — name, mobile phone, ConnectionStatusValueId=66 (\"Visitor\" in this Rock install), PrimaryCampusId.\n2. Rock writes the Person row and stamps `ModifiedDateTime` to the current UTC time.\n3. On its next tick (within 5 minutes on a service day), the SaltLight poll Lambda calls `GET /api/People` filtered by the stored cursor timestamp.\n4. For each returned Person, SaltLight checks whether a Connect Card already exists for this Rock Person. If yes, skip.\n5. For new Persons: resolve `PrimaryCampusId` to a campus name, pull the mobile phone from the `PhoneNumbers` list, write one `connect_card` row tagged `source: rock_track1`.\n6. Insert one `interaction` row per active CareFlow that has a Rock config.\n7. Advance `poll_cursor_track1` in `account_metadata['rockrms']` to the max `ModifiedDateTime` seen in this batch.\n\n**Track 2 — Rock Workflow form submission**\n\n1. A guest fills out the church's existing connect card form in Rock (e.g. \"First Time Guest,\" WorkflowTypeId=24) at a kiosk or via a web form.\n2. Rock creates a Workflow instance and sets its Status to `Completed`. Each form field is persisted as a Rock Workflow AttributeValue keyed by `(AttributeId, EntityId=Workflow.Id)`.\n3. On its next tick, the poll Lambda queries Workflows filtered by `WorkflowTypeId`, `Status=Completed`, and `CreatedDateTime` after `poll_cursor_track2`.\n4. For each returned Workflow instance, SaltLight dedupes on `rock_workflow_id`. If a Connect Card already exists for this Workflow instance, skip.\n5. SaltLight looks up the `attribute_ids` for this `workflow_type_id` from `account_metadata['rockrms']['mapped_forms']` (set in Feature 1b — the account-level form mapping). It then batch-fetches all AttributeValues for those AttributeIds. Note: `trigger_attribute_id` (the CareFlow's optional filter field) is also included in the AttributeValues batch fetch — it comes from the CareFlow's `workflow_data['rockrms']` config (Feature 2 Step 6), not from `mapped_forms`. Only the five core field mappings (first_name, last_name, email, phone, campus) live in `mapped_forms`.\n6. Read first name, last name, email, phone, and the CampusPicker value (stored as a string integer — e.g. `\"1\"`, not `\"Main Campus\"`), resolve the campus name from the cached campus list, and write one `connect_card` row tagged `source: rock_track2`.\n7. If `InitiatorPersonAliasId` is non-null, call `GET /api/PersonAlias/{aliasId}` to link to an existing Rock Person. If null (common in anonymous kiosk submissions), process the Workflow from AttributeValues alone — no Person link required.\n8. Insert one `interaction` row per matching CareFlow.\n9. Advance `poll_cursor_track2` to the global max `CreatedDateTime` seen across all configured WorkflowTypeIds.\n\n## Examples\n\n**Track 1 — Staff-added Rock Person.** A volunteer creates James Wilson in Rock at 10:05am Sunday — name, mobile, Visitor status, campus set to Main Campus (Id=1). Rock stamps `ModifiedDateTime=2026-05-24T15:05:00Z`. At 10:10am the SaltLight poll runs, finds James in the response, dedupes (no existing card for `rock_person_id=9`), resolves `PrimaryCampusId=1` → \"Main Campus,\" picks the mobile phone number, and writes a Connect Card with `source='rock_track1'`. Cursor advances to `2026-05-24T15:05:00Z`.\n\n**Track 2 — James fills out a form.** James walks to the welcome kiosk and submits the church's \"First Time Guest\" form (WorkflowTypeId=24). Rock creates Workflow.Id=1, Status=Completed. The next poll fetches Workflow 1, reads AttributeValues 8281–8285 (the five core fields from `account_metadata['rockrms']['mapped_forms']`, set once in Feature 1b) plus AttributeId 8286 (the trigger attribute from the CareFlow's Step 6 `trigger_attribute_id`), resolves the CampusPicker value `\"1\"` → \"Main Campus,\" and creates a second Connect Card tagged `source='rock_track2'`.\n\n**Dedup — same form submitted twice.** James hits submit twice at the kiosk. Rock creates Workflow.Id=1 and Workflow.Id=2. The poller creates a Connect Card for each (they're distinct Workflow instances). Dedup only prevents the same Workflow.Id from creating two cards — two distinct submissions are two distinct cards. This is intentional.\n\n**Dedup — same Person re-touched.** A volunteer edits James's email in Rock the next day. His `ModifiedDateTime` bumps and the poll returns Person.Id=9 again. Dedup query against `rock_person_id='9'` finds the existing Connect Card — skip. No duplicate created.\n\n## Acceptance criteria\n\n**Track 1**\n\n- The poller fetches Rock Person records modified after `poll_cursor_track1`.\n- A Connect Card is created for each Person not already in SaltLight (dedup by Rock Person Id).\n- `PrimaryCampusId` is resolved to a campus name before writing the card. If resolution fails, the card is still created with campus left blank.\n- Mobile phone is pulled from the `PhoneNumbers` list using `NumberTypeValueId == rock_meta['mobile_id']`. If no mobile phone exists, the card is created with phone blank — not a crash.\n- `poll_cursor_track1` is advanced to the max `ModifiedDateTime` in the batch after each successful poll. Cursors are NOT advanced when the batch is empty.\n- Already-seen Person records are not re-processed.\n\n**Track 2**\n\n- The poller fetches Workflow instances where `WorkflowTypeId` matches a configured CareFlow, `Status=Completed`, and `CreatedDateTime` is after `poll_cursor_track2`.\n- A Connect Card is created for each Workflow instance not already in SaltLight (dedup by `rock_workflow_id`).\n- Guest fields are read from AttributeValues using the AttributeId mapping stored in `account_metadata['rockrms']['mapped_forms']` (set once per form in Feature 1b) — not from the CareFlow config, and not guessed or hardcoded. Lookup pattern: `form_map = {f['workflow_type_id']: f['attribute_ids'] for f in mapped_forms}; attr_ids = form_map.get(cfg['workflow_type_id'])`.\n- CampusPicker values (string integers like `\"1\"`) are resolved to campus names before writing the card.\n- Workflows with a null `InitiatorPersonAliasId` are processed from AttributeValues alone — no Person link required, no crash.\n- If a trigger field is configured (Step 6), only Workflow instances where that AttributeValue matches one of the allowed values create a Connect Card. Non-matching instances are skipped.\n- `poll_cursor_track2` is advanced to the global max `CreatedDateTime` across all configured WorkflowTypeIds after each successful poll tick (all types succeeded).\n- **If any configured WorkflowType's poll raises an exception during a tick, `poll_cursor_track2` is NOT advanced** — `latest_cursor_2` is discarded entirely and the cursor stays at its pre-poll value. Partial success (advancing for succeeded types only) is NOT allowed.\n- One `interaction` row is inserted per matching CareFlow per new Connect Card.\n\n**Both tracks**\n\n- Poll frequency is higher on configured service days and lower on weekdays. The schedule is stored per-account in `account_metadata['rockrms']['poll_schedule']`.\n- A Rock API failure on one tick does not advance the cursor — the next tick retries from the same position.\n- One account's Rock API failure does not abort processing for other accounts.\n- Every Connect Card created by this Lambda carries either `source='rock_track1'` or `source='rock_track2'` — so Feature 4 can recognize and skip them, preventing echo loops.\n- Feature 3 does NOT apply Rock Tags or create Rock Workflows. All write-back to Rock (tags, workflows, AttributeValues) is Feature 4's responsibility. Rock-originated cards (`rock_track1`, `rock_track2`) are excluded from Feature 4 write-back by the source guard — this means Rock-originated guests do not receive Rock tag/workflow write-back in v1. This is a known v1 limitation.\n\n---\n\n## Technical API contract\n\n### Poll trigger\n\n- **Schedule.** EventBridge rule `rock-poll-{env}` fires the orchestrator Lambda every 5 minutes with `{\"scheduled_event\": true, \"function\": \"rock_poll\"}`. Per-account schedule shaping (service-day vs. weekday) is handled inside the handler — the EventBridge cadence is always 5 minutes.\n- **Entry point.** `rock_poll_handler(event)` in `tf/lambda_functions/orchestrator/src/rockrms.py`, registered in the `SCHEDULED_EVENT_FUNCTIONS` dict in `main.py` as `\"rock_poll\": rock_poll_handler`.\n- **Account selection.** `SELECT account_id, account_metadata->'rockrms' AS rock_meta FROM public.account WHERE (account_metadata->'rockrms'->>'connected')::boolean = true AND account_active = true`. Each account is processed inside its own try/except.\n\n> **Kenneth — verify column name:** The CareFlow query in `_poll_rock_account` must filter by the active-flag column on the `workflow` table. Confirm whether the column is `workflow_active` or `workflow_present` in the actual schema before implementation. The query pattern should be: `SELECT ... FROM public.workflow WHERE workflow_data ? 'rockrms' AND [active_column] = true AND account_id = %s`.\n\n### Track 1 — People poll\n\n- **Endpoint.** `GET /api/People?$filter=ModifiedDateTime gt datetime'{cursor}'&$expand=PhoneNumbers&$orderby=ModifiedDateTime asc&$top=100`\n- **Response shape — CONFIRMED.** Bare JSON array `[...]`. Run it through `_to_list()`.\n- **Datetime literal.** Cursor must be wrapped in `datetime'...'`. Bare ISO strings return HTTP 400.\n- **Fields available inline (no expand needed).** `Id`, `FirstName`, `LastName`, `Email`, `PrimaryFamilyId`, `ConnectionStatusValueId`, `PrimaryAliasId`, `PrimaryCampusId` (scalar int or null), `ModifiedDateTime`, `CreatedDateTime`.\n- **Fields requiring `$expand=PhoneNumbers`.** Without the expand, `PhoneNumbers` is an empty array. With it, each phone has `Number` (digits only, e.g. `\"5552011001\"`), `NumberFormatted` (`\"(555) 201-1001\"`), `NumberTypeValueId` (mobile is `12` on saltlight.rockcloud.com — read from `rock_meta['mobile_id']`), and `IsMessagingEnabled`.\n- **Do NOT add `$select`.** When combined with `$expand=PhoneNumbers`, Rock silently strips the PhoneNumbers collection from the response.\n- **Campus resolution.** Only `PrimaryCampusId` (a scalar int) is available inline. `$expand=Campus` is silently ignored — no nested Campus object is ever returned. Resolve the name from `rock_meta['campuses']` (cached at connect time). If `PrimaryCampusId` is null or unknown to the cache, `campus_name` is null. Test data note: all 10 test people (Ids 9–18) have `PrimaryCampusId: null`, so the first end-to-end test run will show null campus everywhere — that is test-data emptiness, not a bug.\n- **Cursor.** `ModifiedDateTime` ascending, stored in `account_metadata['rockrms']['poll_cursor_track1']`. Advanced to `max(p['ModifiedDateTime'] for p in new_people)` only when `new_people` is non-empty.\n\n### Track 2 — Workflow poll\n\n- **Endpoint.** `GET /api/Workflows?$filter=WorkflowTypeId eq {id} and Status eq 'Completed' and CreatedDateTime gt datetime'{cursor}'&$orderby=CreatedDateTime asc&$top=100`\n- **Response shape — CONFIRMED.** Bare JSON array `[...]`. Run through `_to_list()`.\n- **Status filter.** `Status eq 'Completed'` is the correct literal. Confirmed status values on saltlight.rockcloud.com are `\"Completed\"` and `\"Active\"`.\n- **Fields available inline.** `Id`, `WorkflowTypeId`, `WorkflowIdNumber`, `Status`, `InitiatorPersonAliasId` (nullable), `CreatedDateTime`, `ModifiedDateTime`, `CompletedDateTime`, `CampusId` (nullable scalar int).\n- **`InitiatorPersonAliasId` null handling.** All 5 pre-populated test workflow fixtures have `InitiatorPersonAliasId: null`. Production workflows submitted by signed-in users should have it set, but code MUST treat null as expected — log a debug line, skip the person resolution, and continue processing the workflow from AttributeValues only.\n- **PersonAlias resolution (when not null).** `GET /api/PersonAlias/{aliasId}?$select=Id,PersonId` returns the full PersonAlias object (Rock ignores `$select` on single-record GETs — that's fine, just `.get('PersonId')`). Use `.get('PersonId')` defensively.\n- **Do NOT use `$expand=AttributeValues` on `/api/Workflows`.** Returns HTTP 400 — AttributeValues are not OData nav properties. Fetch them separately (see next section).\n- **Cursor.** `CreatedDateTime` ascending, stored in `account_metadata['rockrms']['poll_cursor_track2']`. Iterate every configured `workflow_type_id` (deduped via a `type_ids_seen` set), accumulate the per-type max, and write the global max once after all types finish.\n\n### Track 2 — AttributeValues batch fetch\n\n- **Endpoint.** `GET /api/AttributeValues?$filter=AttributeId eq {id1} or AttributeId eq {id2}...&$select=AttributeId,EntityId,Value&$top=5000`\n- **Response shape — CONFIRMED.** Bare JSON array `[...]`. Run through `_to_list()`.\n- **Fields returned.** `AttributeId`, `EntityId`, `Value` — all present even with `$select`.\n- **Batching.** Build a single OR-of-AttributeIds filter per workflow type per poll run. Then group locally by `EntityId == wf['Id']` to assemble the `wf_attrs: {AttributeId → Value}` dict for each workflow instance.\n- **Field-type value formats — CONFIRMED on saltlight.rockcloud.com:**\n  - Text (FieldTypeId 1): raw string, e.g. `\"James\"`.\n  - Email (FieldTypeId 71): raw string, e.g. `\"james.wilson@example.com\"`.\n  - Phone (stored as Text FieldTypeId 1 in this form): raw string with formatting, e.g. `\"(555) 201-1001\"`. Do not strip — store as-is in `rock_data.phone`.\n  - Value List (FieldTypeId 6): raw label string, e.g. `\"Sunday Service\"` — already the human label, no lookup needed.\n  - CampusPicker (FieldTypeId 30): string integer e.g. `\"1\"` or `\"2\"` — this is `Campus.Id` as a string, NOT the campus name. `_create_connect_card_from_workflow` must resolve it via `rock_meta['campuses']` before writing the card.\n\n### Deduplication\n\n- **Track 1.** Before insert: `SELECT connect_card_id FROM public.connect_card WHERE account_id = %s AND connect_card_data->>'rock_person_id' = %s`. If a row exists, skip. (The cast `->>'` returns text, so pass `str(person['Id'])`.)\n- **Track 2.** Same shape with `connect_card_data->>'rock_workflow_id'` and `str(wf['Id'])`.\n- **Why pre-check, not unique constraint.** Rock person/workflow Ids are not globally unique across SaltLight accounts — they're only unique within one Rock install. Scoping the lookup with `account_id = %s` makes a single pre-check sufficient.\n\n**Performance note:** Both dedup queries scan a JSONB field on a potentially large table. Add these indexes to the migration:\n\n```sql\nCREATE INDEX CONCURRENTLY idx_connect_card_rock_person_id\n    ON public.connect_card ((connect_card_data->>'rock_person_id'))\n    WHERE connect_card_data->>'rock_person_id' IS NOT NULL;\n\nCREATE INDEX CONCURRENTLY idx_connect_card_rock_workflow_id\n    ON public.connect_card ((connect_card_data->>'rock_workflow_id'))\n    WHERE connect_card_data->>'rock_workflow_id' IS NOT NULL;\n```\n\n**Concurrency note:** Two simultaneous Lambda invocations (possible if EventBridge fires while a prior invocation is still running) can both pass the dedup SELECT before either inserts, creating duplicate cards. The safest mitigation is to set the poll Lambda's reserved concurrency to 1 in the Lambda configuration — this prevents overlapping executions at zero cost. Document this in your deployment notes.\n\n### `connect_card_data` shape written to DB\n\nTrack 1:\n\n```json\n{\n  \"source\": \"rock_track1\",\n  \"rock_person_id\": 9,\n  \"rock_data\": {\n    \"first_name\": \"James\",\n    \"last_name\": \"Wilson\",\n    \"email\": \"james.wilson@example.com\",\n    \"phone\": \"5552011001\",\n    \"campus_id\": 1,\n    \"campus_name\": \"Main Campus\"\n  }\n}\n```\n\nTrack 2:\n\n```json\n{\n  \"source\": \"rock_track2\",\n  \"rock_workflow_id\": 1,\n  \"rock_workflow_type_id\": 24,\n  \"rock_data\": {\n    \"first_name\": \"James\",\n    \"last_name\": \"Wilson\",\n    \"email\": \"james.wilson@example.com\",\n    \"phone\": \"(555) 201-1001\",\n    \"campus_name\": \"Main Campus\"\n  }\n}\n```\n\nNote: Track 1 phone is digits-only (`PhoneNumbers[].Number`); Track 2 phone is whatever string the Rock form stored, typically formatted. Downstream consumers normalize both via the existing `format_phone()` helper.\n\n### OData response shape — CORRECTED rule\n\n> Earlier drafts of this spec said `/api/People` and `/api/Workflows` return `{\"value\":[...]}` while only the other endpoints return bare arrays. **That was wrong.** Live testing on saltlight.rockcloud.com (Rock 18.1.0.0) confirms that ALL list endpoints on this install return bare JSON arrays `[...]`. The `_to_list()` helper must be applied uniformly to every list response — `/api/People`, `/api/Workflows`, `/api/AttributeValues`, `/api/WorkflowTypes`, `/api/Tags`, `/api/Attributes`, `/api/AttributeQualifiers`, `/api/Campuses`, `/api/DefinedValues`. Do NOT call `.get('value', [])` on any of them. The earlier wording in the API gotchas table is superseded by this section.\n\n### Known gotchas (live-confirmed)\n\n- **`$expand=Campus` is silently ignored.** No nested Campus object is ever returned on `/api/People`. Use the cached campus list.\n- **`$select` strips `$expand=PhoneNumbers`.** Use `$expand=PhoneNumbers` alone; do not combine with `$select`.\n- **`$expand=AttributeValues` on `/api/Workflows` → HTTP 400.** Always batch-fetch AttributeValues separately.\n- **Bare ISO datetime in `$filter` → HTTP 400.** Always wrap with `datetime'...'`.\n- **`$select` on single-record GETs is ignored.** `GET /api/PersonAlias/{id}?$select=Id,PersonId` returns the whole object. Use `.get('PersonId')` defensively.\n- **All test people have null campus.** Expected during initial test runs; not a bug.\n- **All test workflows have null `InitiatorPersonAliasId`.** Code must skip person resolution gracefully when null.\n- **Cursors are strings, not datetimes.** They round-trip through JSONB. Compare/`max()` lexically — ISO-8601 sorts correctly as string.\n- **Cursors stored without timezone suffix.** All cursor and timestamp strings in `account_metadata` must include a UTC marker (e.g. `\"2026-05-24T15:05:00Z\"`). Use `datetime.utcnow().isoformat() + 'Z'` or `datetime.now(timezone.utc).isoformat()` when writing. Without `Z`, comparisons against timezone-aware Python datetimes raise `TypeError`.\n- **Track 2 cursor and partial type failures.** If one WorkflowType's poll raises an exception mid-batch, do NOT advance `poll_cursor_track2` at all that tick — discard `latest_cursor_2` and leave the cursor at its pre-poll value. A succeeded type's timestamps must not advance the cursor past a failed type's unprocessed window. Treat any per-type failure as a full Track 2 failure for that account on that tick.\n\n---\n\n## Reference implementation (optional)\n\n> Kenneth — this is one way to wire the above together. Skip if you prefer your own structure; only the API contract and acceptance criteria above are binding.\n\n**Handler entry — `rock_poll_handler(event)`**\n\nFetches every connected, active Rock account; calls `_poll_rock_account(account_id, rock_meta, db)` inside a try/except per account. One account's failure logs and continues.\n\n**Per-account driver — `_poll_rock_account(account_id, rock_meta, db)`**\n\n1. Instantiate `RockRMS(account_id=account_id)`.\n2. Load active CareFlows with Rock config (`workflow_data ? 'rockrms'`). Return early if none.\n3. Track 1: read `poll_cursor_track1` (fallback `connected_at`), call `poll_new_people(since=cursor)`, iterate. For each person: dedup on `rock_person_id` → if new, call `_create_connect_card_from_person(...)`. (No Rock write-back here — tag and workflow write-back is Feature 4's responsibility. Feature 3 creates the Connect Card and inserts the interaction row only.) After the loop, advance the cursor to `max(p['ModifiedDateTime'] for p in new_people)`.\n4. Track 2: read `poll_cursor_track2` (fallback `connected_at`). Walk CareFlows, dedupe `workflow_type_id`s via a `seen` set. Look up the `attribute_ids` for each `workflow_type_id` from `account_metadata['rockrms']['mapped_forms']` (Feature 1b data). For each type, **wrap the per-type poll in a try/except**: call `poll_new_workflow_completions(workflow_type_id, since=cursor)`. If a per-type call raises, set a `track2_failed = True` flag, log the error, and continue to the next type. Collect every `attribute_id` (form fields + trigger) into one OR-of-Ids filter, call `batch_fetch_attribute_values(ids)` once. For each workflow: dedup on `rock_workflow_id`; build `wf_attrs = {av['AttributeId']: av['Value'] for av in attr_values if av['EntityId'] == wf['Id']}`; for each matching CareFlow config, check `trigger_value in cfg['trigger_values']` and call `_create_connect_card_from_workflow(...)` if it matches. Accumulate `latest_cursor_2` as the max `CreatedDateTime` seen across all types. After the loop: **if `track2_failed` is True, do NOT write `latest_cursor_2`** — leave `poll_cursor_track2` at its pre-poll value. Otherwise write once at the end.\n\n**Card writer — `_create_connect_card_from_person(account_id, person, rock_meta, active_careflows, db) -> int`**\n\n- Resolve `campus_id = person.get('PrimaryCampusId')` and look up `campus_name` from `rock_meta['campuses']` (None if not found).\n- Resolve `phone` as the first `PhoneNumbers[].Number` whose `NumberTypeValueId == rock_meta['mobile_id']`.\n- Assemble the Track 1 `card_data` JSON (shape above).\n- `INSERT INTO public.connect_card (account_id, connect_card_data, connect_card_processed) VALUES (%s, %s, false) RETURNING connect_card_id`.\n- For each CareFlow in `active_careflows`, insert one `public.interaction` row with `interaction_status = 'pending'`.\n- Return the new `connect_card_id`.\n\n**Card writer — `_create_connect_card_from_workflow(account_id, wf, wf_attrs, cfg, workflow_id, rock_meta, db) -> int`**\n\n- Look up `attr_ids` from `account_metadata['rockrms']['mapped_forms']`: `form_map = {f['workflow_type_id']: f['attribute_ids'] for f in rock_meta.get('mapped_forms', [])}; attr_ids = form_map.get(cfg['workflow_type_id'])`. If `attr_ids` is None (form not yet mapped), log a warning and skip.\n- Pull `first_name`, `last_name`, `email`, `phone` directly from `wf_attrs.get(attr_ids[field])` (string values, formatted as Rock stored them).\n- Read the raw campus value `wf_attrs.get(attr_ids.get('campus'))`. It's a string Id (`\"1\"`). Resolve to `campus_name` via `rock_meta['campuses']` (compare `int(value)` to each `campus['id']`).\n- Assemble the Track 2 `card_data` JSON (shape above) including `rock_workflow_id`, `rock_workflow_type_id`.\n- Same `INSERT … RETURNING connect_card_id` and one `interaction` row keyed to the matched `workflow_id` (the SaltLight CareFlow, not the Rock workflow).\n- Return the new `connect_card_id`.\n\n**Cursor writer — `_update_poll_cursor(account_id, cursor_track1, cursor_track2, last_polled, db)`**\n\nSingle UPDATE using nested `jsonb_set` calls to update all three cursors (`poll_cursor_track1`, `poll_cursor_track2`, `last_polled`) atomically in one statement. This avoids a race window that would exist between separate UPDATE calls. If a track had no new records this tick, pass the existing stored cursor value so it does not advance.\n\n```sql\n-- Updates poll_cursor_track1, poll_cursor_track2, AND last_polled in one atomic statement.\n-- Use nested jsonb_set to avoid a race window between separate UPDATE calls.\nUPDATE public.account\nSET account_metadata = jsonb_set(\n    jsonb_set(\n        jsonb_set(\n            account_metadata,\n            ARRAY['rockrms', 'poll_cursor_track1']::text[],\n            to_jsonb(%s::text)\n        ),\n        ARRAY['rockrms', 'poll_cursor_track2']::text[],\n        to_jsonb(%s::text)\n    ),\n    ARRAY['rockrms', 'last_polled']::text[],\n    to_jsonb(%s::text)\n)\nWHERE account_id = %s\n-- Params: (new_cursor_track1, new_cursor_track2, now_utc, account_id)\n-- Pass None/NULL values as the existing stored value if a track had no new records this tick.\n```\n\nParams: `(new_cursor_track1, new_cursor_track2, now_utc, account_id)`. Pass the existing `poll_cursor_track1` value if Track 1 had no new records (so it doesn't advance); pass the existing `poll_cursor_track2` value if Track 2 had no new records (so it doesn't advance). The string-form path `'{rockrms,%s}'` does NOT bind `%s` and writes the literal `\"%s\"` into JSONB — always use the ARRAY form.\n\n**Helper — `_to_list(response)`**\n\nAlready in `shared/integrations/rockrms.py` from prior work. Returns `response` if it's already a list, else `response.get('value', [])` as a safety net. Per the corrected rule above, every list endpoint on this Rock install returns a bare array, so the `.get('value', [])` branch is defensive only — never relied on.\n\n---\n\n## Implementation upgrade notes\n\n> **Kenneth — read this before touching the existing `rockrms.py` implementation.** The current implementation has several bugs that conflict with this spec. Fix these before building:\n\n1. **`poll_new_people()` — use `ModifiedDateTime`, not `CreatedDateTime`.** Track 1 filters and sorts by `ModifiedDateTime`. If the existing method uses `CreatedDateTime` in the `$filter` or `$orderby`, change both to `ModifiedDateTime`. The cursor advance must also use `max(p['ModifiedDateTime'] for p in new_people)`.\n\n2. **`poll_new_people()` and `poll_new_workflow_completions()` — use `_to_list()`, not `.get('value', [])`.** All Rock list endpoints return bare arrays. Calling `.get('value', [])` directly on the response raises `AttributeError: 'list' object has no attribute 'get'`. Use `self._to_list(self.api_request('GET', url))`.\n\n3. **Remove any tag write-back loop from `_poll_rock_account()`.** Feature 3 is ingestion only. If the existing implementation has a loop like `for cfg in careflow['rock_config']: tag_id = cfg.get('writeback_tag_id'); if tag_id: apply_rock_tag(...)` — delete it entirely. Tag and workflow write-back belongs to Feature 4.\n\n4. **`_update_poll_cursor()` — must be the 3-cursor atomic version.** If the existing function takes a single `cursor_key` parameter and makes separate UPDATE calls per cursor, replace it with the nested `jsonb_set` version shown in the \"Cursor writer\" section above. Two separate UPDATE
